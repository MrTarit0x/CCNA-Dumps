{d:"D4",hot:1,q:"What is 'Inside Local' in NAT terminology?",opts:["The public IP of internal host","The private IP of an internal host — the real IP before translation","The IP of an external server","The router's WAN interface IP"],ans:1,exp:"NAT terms: Inside Local = REAL private IP of internal host (e.g., 192.168.1.10). Inside Global = translated PUBLIC IP representing the host on internet. Outside Local = IP of external host as seen inside. Outside Global = real IP of external host."},
{d:"D4",hot:1,q:"PAT (NAT Overload) allows many hosts to share ONE public IP using what?",opts:["Different MAC addresses","Unique source port numbers","Different TTL values","Different VLAN tags"],ans:1,exp:"PAT tracks each session using: Protocol + Public IP + Unique source port. The router assigns unique source ports (1024-65535) to differentiate sessions. Allows ~60,000 simultaneous sessions per public IP."},
{d:"D4",hot:1,q:"Which command enables PAT on a Cisco router using the WAN interface IP?",opts:["ip nat inside source list 1 pool NAT","ip nat inside source list 1 interface Gi0/1 overload","ip nat overload Gi0/1","ip nat pat list 1 interface Gi0/1"],ans:1,exp:"PAT config: 'ip nat inside source list 1 interface Gi0/1 overload'. 'list 1' = ACL defining which IPs to translate. 'interface Gi0/1' = use WAN IP as public. 'overload' = enables PAT (many-to-one)."},
{d:"D4",hot:1,q:"'ip nat inside' and 'ip nat outside' are configured on the wrong interfaces. What happens?",opts:["NAT works but is slower","NAT completely fails — inside/outside must be on correct interfaces","Only static NAT fails","Only PAT fails"],ans:1,exp:"NAT requires 'ip nat inside' on LAN-facing interface and 'ip nat outside' on WAN-facing interface. If reversed, NAT doesn't work at all. 'show ip nat statistics' shows inside/outside interfaces — verify this first when troubleshooting."},
{d:"D4",hot:1,q:"What is the DHCP DORA process in correct order?",opts:["Offer → Discover → Request → ACK","Discover → Offer → Request → Acknowledge","Request → Discover → ACK → Offer","Discover → Request → Offer → ACK"],ans:1,exp:"DORA: Discover (client broadcast, 0.0.0.0→255.255.255.255) → Offer (server offers IP) → Request (client requests that IP, still broadcast) → Acknowledge (server confirms lease). All on UDP 67/68."},
{d:"D4",hot:1,q:"Which command configures DHCP relay on a router interface facing clients?",opts:["ip dhcp-relay 10.1.1.100","ip helper-address 10.1.1.100","ip dhcp forward 10.1.1.100","service dhcp-relay 10.1.1.100"],ans:1,exp:"'ip helper-address [server-IP]' on the CLIENT-FACING interface converts DHCP broadcasts to unicast and forwards to the server. Without this, DHCP broadcasts never reach servers on different subnets."},
{d:"D4",hot:1,q:"Which DHCP pool command sets the default gateway for clients?",opts:["gateway 192.168.1.1","default-router 192.168.1.1","ip default-gateway 192.168.1.1","route 192.168.1.1"],ans:1,exp:"'default-router [IP]' inside DHCP pool config provides the gateway to clients. 'ip default-gateway' is used on SWITCHES for their own management traffic — different command, different purpose."},
{d:"D4",hot:1,q:"NTP stratum 16 means what?",opts:["Highest accuracy time source","The device is 16 hops from atomic clock","The device is UNSYNCHRONIZED — no valid time source","Stratum 16 is reserved for GPS"],ans:2,exp:"NTP stratum 0-15 are valid synchronized levels. Stratum 16 = unsynchronized — the device has no valid NTP source. Check 'show ntp status': 'Clock is synchronized' = good. 'unsynchronized' = bad, stratum 16."},
{d:"D4",hot:1,q:"Which command makes a router an NTP server at stratum 3?",opts:["ntp server 3","ntp master 3","ntp stratum 3","ntp enable level 3"],ans:1,exp:"'ntp master [stratum]' makes the router an NTP server. 'ntp master 3' = stratum 3. Devices syncing from this router become stratum 4. Default if no stratum specified = 8."},
{d:"D4",hot:1,q:"What syslog severity level is level 3?",opts:["Debug","Warning","Error","Informational"],ans:2,exp:"Syslog severity 0-7: 0=Emergency, 1=Alert, 2=Critical, 3=Error, 4=Warning, 5=Notice, 6=Informational, 7=Debug. Memory: 'Every Awful Cisco Engineer Will Need Debug' = Emergency, Alert, Critical, Error, Warning, Notice, Informational, Debug."},
{d:"D4",hot:1,q:"'Logging trap warnings' sends which severity levels to the syslog server?",opts:["Only level 4","Levels 0-4 (Emergency through Warning)","Levels 4-7","All levels 0-7"],ans:1,exp:"Setting level = that level AND all more critical levels (lower numbers) are sent. 'logging trap warnings' (level 4) sends: 0,1,2,3,4 (Emergency through Warning). Levels 5,6,7 are NOT sent to server."},
{d:"D4",hot:1,q:"Which SNMP version provides authentication AND encryption?",opts:["SNMPv1","SNMPv2c","SNMPv3 with authPriv","SNMPv2 with community string"],ans:2,exp:"SNMPv3 authPriv = Authentication (MD5/SHA) + Privacy/encryption (AES/DES). v1 and v2c use community strings — no real security. noAuthNoPriv = no security. authNoPriv = auth only, no encryption. Only authPriv is truly secure."},
{d:"D4",hot:1,q:"SNMP uses which ports?",opts:["TCP 161 and 162","UDP 161 (agent/polling) and UDP 162 (NMS/traps)","UDP 161 only","TCP 514 and UDP 161"],ans:1,exp:"SNMP: UDP 161 = agent listens for Get/Set from NMS (polls). UDP 162 = NMS listens for Trap/Inform from agents (alerts). Remember: 161=polling direction (NMS→agent), 162=trap direction (agent→NMS)."},
{d:"D4",q:"What is the difference between SNMP Trap and Inform?",opts:["Traps use TCP; Informs use UDP","Trap = no ACK (unreliable); Inform = acknowledged by NMS (reliable)","They are identical","Traps are v3 only"],ans:1,exp:"Trap: agent sends alert to NMS, no acknowledgment. If lost, it's gone. Inform: agent sends alert AND waits for NMS acknowledgment — if not acknowledged, retransmits. Informs are more reliable but use more resources. Available in v2c and v3."},
{d:"D4",q:"Which command shows active DHCP leases on a Cisco router?",opts:["show ip dhcp pool","show ip dhcp binding","show ip dhcp conflict","show dhcp leases"],ans:1,exp:"'show ip dhcp binding' shows all active leases: MAC address → assigned IP, lease expiry time, type (automatic/manual). Use to trace which device has which IP and diagnose IP conflicts."},
{d:"D4",q:"What does 'show ip nat translations' show?",opts:["NAT config only","Active translation entries — Inside Local, Inside Global, Outside addresses","Routing table","Interface status"],ans:1,exp:"'show ip nat translations' shows the active NAT table with all current session translations. Empty = no active sessions or NAT misconfigured. Check this AND 'show ip nat statistics' when troubleshooting NAT."},
{d:"D4",q:"QoS LLQ combines which two queuing methods?",opts:["FIFO + WFQ","CBWFQ + strict Priority Queue","PQ + FIFO","WFQ + Tail Drop"],ans:1,exp:"LLQ (Low Latency Queuing) = CBWFQ (bandwidth guarantees per class) + strict Priority Queue (for voice). Voice always gets forwarded first with guaranteed low latency. CBWFQ handles data with minimum bandwidth guarantees."},
{d:"D4",q:"What DSCP value is used to mark voice payload (VoIP RTP) traffic?",opts:["CS0 (0)","AF41 (34)","EF (46)","CS3 (24)"],ans:2,exp:"DSCP EF (Expedited Forwarding) = value 46 = voice payload. Voice signaling uses CS3 (24). Interactive video uses AF41 (34). Best effort (default) = CS0 (0). EF maps to the strict priority queue in LLQ."},
{d:"D4",q:"What is the difference between QoS policing and shaping?",opts:["Policing buffers excess; shaping drops it","Policing DROPS excess traffic; shaping BUFFERS and delays excess traffic","They are identical","Policing is inbound only; shaping outbound only"],ans:1,exp:"Policing: excess traffic dropped (or re-marked) — no delay added, used for rate enforcement. Shaping: excess traffic buffered and sent later — smooths traffic, adds delay but fewer drops. Use shaping before sending to ISP."},
{d:"D4",q:"FTP uses which ports?",opts:["UDP 20 and 21","TCP 20 (data) and TCP 21 (control)","TCP 21 only","UDP 69"],ans:1,exp:"FTP: TCP port 21 = control channel (commands, authentication). TCP port 20 = data transfer in active mode. Passive mode: client initiates both connections on negotiated ports. TFTP uses UDP 69 (simpler, no auth)."},
{d:"D4",q:"Which command backs up running config to a TFTP server?",opts:["tftp copy running-config 10.1.1.100","copy running-config tftp","save running-config tftp","backup running-config 10.1.1.100"],ans:1,exp:"'copy running-config tftp' initiates TFTP transfer. Router prompts for server IP and destination filename. Remember: source → destination order. 'copy tftp running-config' restores from TFTP."},
{d:"D4",q:"A host receives 169.254.x.x. Which DHCP command would help troubleshoot?",opts:["show ip dhcp binding","show ip dhcp conflict","show ip dhcp statistics","show ip dhcp excluded-address"],ans:2,exp:"'show ip dhcp statistics' shows Discover, Offer, Request, ACK counts. If Discovers are sent but no Offers received = server not responding. Also check: 'show ip dhcp binding' to see if server is assigning IPs, and verify 'ip helper-address' is configured."},
{d:"D4",q:"DNS record type 'A' maps what to what?",opts:["IPv6 address to hostname","Hostname to IPv4 address","IP to mail server","Alias to canonical name"],ans:1,exp:"DNS A record: hostname → IPv4 address. AAAA record: hostname → IPv6. MX: domain → mail server. CNAME: alias → canonical name. PTR: IP → hostname (reverse lookup). NS: domain → name server."},
{d:"D4",q:"What does 'service timestamps log datetime msec' do?",opts:["Sets the syslog server","Adds date, time, and milliseconds to all log messages","Configures NTP sync","Enables SNMP traps"],ans:1,exp:"'service timestamps log datetime msec' adds timestamp (date + time + milliseconds) to every syslog message. Without timestamps, log messages can't be correlated to events. Critical for production troubleshooting."},
{d:"D4",q:"Which command sends syslog messages to server 10.1.1.200?",opts:["logging 10.1.1.200","logging host 10.1.1.200","syslog server 10.1.1.200","logging trap 10.1.1.200"],ans:1,exp:"'logging host 10.1.1.200' configures external syslog server. The server stores messages persistently. Also configure 'logging trap [level]' to set which severity to forward."},
{d:"D4",q:"What is 'ip dhcp excluded-address 192.168.1.1 192.168.1.20' used for?",opts:["Blocks those IPs from the network","Reserves those IPs from being assigned by DHCP — for static devices","Creates a DHCP conflict entry","Sets the DHCP lease range"],ans:1,exp:"'ip dhcp excluded-address' prevents the DHCP server from assigning those IPs. Must be configured BEFORE the pool. Reserve for static-IP devices: routers, servers, printers. Forgetting this causes IP conflicts."},
{d:"D4",q:"SNMP community string with 'ro' means:",opts:["Read-only — NMS can GET values but NOT SET","Read-write — full access","Remote only access","Restricted operations"],ans:0,exp:"'snmp-server community PUBLIC ro' = read-only. NMS can only GET (read) values — cannot SET (change device config). 'rw' = read-write. Best practice: use 'ro' unless remote configuration via SNMP is needed."},
{d:"D4",q:"Which SSH command verifies the RSA key size and SSH version on a Cisco device?",opts:["show crypto key mypubkey rsa","show ip ssh","show ssh","show version"],ans:1,exp:"'show ip ssh' shows SSH version, authentication timeout, max retries, and whether SSH is enabled. 'show crypto key mypubkey rsa' shows the actual RSA key details including key size."},
{d:"D4",q:"NTP authentication uses which algorithm by default?",opts:["AES","SHA","MD5","DES"],ans:2,exp:"'ntp authentication-key 1 md5 [key]' — NTP authentication uses MD5 by default. This prevents rogue NTP servers from poisoning network time. The trusted-key must match on both client and server."},
// ═══════════════════════════════════════════════════════
// DOMAIN 5 — SECURITY FUNDAMENTALS (37 questions)
// ═══════════════════════════════════════════════════════
{d:"D5",hot:1,q:"What is the difference between a vulnerability and an exploit?",opts:["They are the same thing","Vulnerability = weakness in a system; exploit = the tool/technique used to attack that weakness","Vulnerability = attack tool; exploit = the weakness","Vulnerability = risk; exploit = threat"],ans:1,exp:"Vulnerability = weakness (unpatched software, weak password, open port). Exploit = the actual tool or technique used to take advantage of the vulnerability. Threat = potential danger. Risk = probability × impact."},
{d:"D5",hot:1,q:"An attacker floods a server with traffic making it unavailable. What attack is this?",opts:["Man-in-the-Middle","Phishing","Denial of Service (DoS)","Replay attack"],ans:2,exp:"DoS = Denial of Service: flood target with traffic/requests to exhaust resources. DDoS = Distributed DoS using botnet. Mitigation: rate limiting, ACLs, anti-DDoS services, ISP upstream filtering."},
{d:"D5",hot:1,q:"Which ACL rule is ALWAYS implicitly at the end of every Cisco ACL?",opts:["permit any","deny host 0.0.0.0","deny any","permit ip any any"],ans:2,exp:"Every ACL ends with an implicit 'deny any' — invisible but always present. Any traffic not matching an explicit permit is dropped. This is why ACLs with only deny statements block ALL traffic. Always add explicit 'permit any' if needed."},
{d:"D5",hot:1,q:"A standard ACL filters traffic based on what?",opts:["Source + destination IP + protocol + port","Source IP address ONLY","Destination IP address only","Protocol and port only"],ans:1,exp:"Standard ACL = source IP only. Extended ACL = source IP + destination IP + protocol + port number. Standard ACL placement: close to DESTINATION (to avoid blocking traffic to other places). Extended: close to SOURCE."},
{d:"D5",hot:1,q:"Where should an extended ACL be placed?",opts:["Close to destination","Close to the SOURCE of traffic","On the core router only","On the WAN link"],ans:1,exp:"Extended ACL close to SOURCE: stops unwanted traffic immediately, saves bandwidth by not forwarding traffic that will eventually be denied. Since it specifies exact source+destination+port, it won't accidentally block other traffic."},
{d:"D5",hot:1,q:"ACL processing is: 10 deny host 10.1.1.5, 20 permit 10.1.1.0/24. Host 10.1.1.5 sends traffic. Result?",opts:["Permitted — matches line 20","Denied — matches line 10 first (top-down, first match wins)","Both lines match — denied wins","Permitted — more specific rule wins"],ans:1,exp:"ACLs process TOP-DOWN, FIRST MATCH WINS. Host 10.1.1.5 matches line 10 (deny) first — processing STOPS immediately. Line 20 is never checked. Specific entries MUST be placed before general ones."},
{d:"D5",hot:1,q:"Which command applies ACL 100 to an interface in the INBOUND direction?",opts:["ip access-list 100 in","ip access-group 100 in","access-group 100 inbound","ip filter 100 in"],ans:1,exp:"'ip access-group [ACL] [in|out]' applies an ACL to an interface. 'in' = filter arriving packets. 'out' = filter leaving packets. Maximum one ACL per direction per interface. 'ip access-group' is for interfaces."},
{d:"D5",hot:1,q:"Which command applies an ACL to restrict SSH access on VTY lines?",opts:["ip access-group 50 in","access-class 50 in (under line vty)","ip filter 50 in","access-list 50 vty"],ans:1,exp:"'access-class [ACL] in' on VTY lines restricts which source IPs can connect via SSH/Telnet. 'ip access-group' is for interfaces, NOT VTY lines. This is a very commonly tested difference."},
{d:"D5",hot:1,q:"What threat does DHCP Snooping prevent?",opts:["MAC flooding","ARP poisoning","Rogue DHCP servers providing incorrect network info to clients","STP topology attacks"],ans:2,exp:"DHCP Snooping = blocks rogue DHCP servers. Marks ports as trusted (uplinks to real server) or untrusted (user ports). DHCP server replies (OFFER, ACK) from untrusted ports are DROPPED. Builds binding table used by DAI."},
{d:"D5",hot:1,q:"After enabling DHCP Snooping, clients can't get IPs. What's wrong?",opts:["DHCP pool is empty","The uplink to DHCP server was NOT configured as 'ip dhcp snooping trust'","VLAN is wrong","STP is blocking"],ans:1,exp:"After 'ip dhcp snooping', ALL ports are untrusted by default. Server replies from untrusted ports are dropped. FIX: 'ip dhcp snooping trust' on the uplink connecting to the real DHCP server. Most common DHCP Snooping mistake."},
{d:"D5",hot:1,q:"Dynamic ARP Inspection (DAI) prevents which attack?",opts:["MAC flooding","DHCP starvation","ARP poisoning / Man-in-the-Middle via fake ARP replies","STP root bridge attack"],ans:2,exp:"DAI validates ARP packets against the DHCP Snooping binding table. Fake ARP replies (ARP poisoning) are dropped. Attackers can't redirect traffic by claiming to be the gateway. DAI REQUIRES DHCP Snooping to be configured first."},
{d:"D5",hot:1,q:"Port security violation 'shutdown' causes what?",opts:["Drops unauthorized frames silently","Drops frames + generates syslog + port stays up","Port goes to err-disabled state immediately","Sends SNMP trap only"],ans:2,exp:"Shutdown (default violation mode): port immediately goes err-disabled — completely disabled. Must recover manually: 'shutdown' then 'no shutdown'. All traffic stops (including from authorized MACs). Configure 'errdisable recovery' for auto-recovery."},
{d:"D5",hot:1,q:"What is the difference between port security 'restrict' and 'protect' modes?",opts:["Restrict blocks all traffic; protect allows authorized MACs","Restrict drops frames + logs/counter; Protect drops frames SILENTLY (no log, no counter)","They are identical","Restrict recovers automatically; protect doesn't"],ans:1,exp:"Both drop frames from unauthorized MACs, port stays UP. Restrict: generates syslog + increments violation counter (visible). Protect: completely silent — no syslog, no counter (invisible, hard to detect). Port stays up for authorized traffic in both."},
{d:"D5",hot:1,q:"Which Cisco password type should ALWAYS be used for privileged EXEC access?",opts:["enable password (Type 0)","service password-encryption (Type 7)","enable secret (Type 5 — MD5)","username password (Type 0)"],ans:2,exp:"'enable secret' uses Type 5 (MD5 hash) — cannot be easily reversed. 'enable password' is Type 0 (plaintext in config!). Type 7 (service password-encryption) is just XOR obfuscation — easily reversed. If both configured, 'enable secret' always overrides."},
{d:"D5",hot:1,q:"Multi-Factor Authentication requires which combination?",opts:["Two passwords (something you know × 2)","A password and a PIN","Two DIFFERENT factor types: e.g., password + fingerprint OR password + token","A username and a password"],ans:2,exp:"MFA = two or more DIFFERENT factor types: something you know (password, PIN), something you have (token, smart card), something you are (biometric). Password + PIN = NOT MFA (both 'know'). Password + fingerprint = MFA."},
{d:"D5",hot:1,q:"What does AAA stand for?",opts:["Access, Authentication, Auditing","Authentication, Authorization, Accounting","Authentication, Access, Accounting","Authorization, Authentication, Auditing"],ans:1,exp:"AAA: Authentication = WHO are you? (verify identity). Authorization = WHAT can you do? (permitted commands/resources). Accounting = WHAT DID you do? (audit log). Memory: 'Who, What, What-did-they-do.'"},
{d:"D5",hot:1,q:"IPsec ESP provides which security services?",opts:["Authentication only — no encryption","Encryption AND authentication of the payload","Key exchange only","Header authentication only — no payload encryption"],ans:1,exp:"ESP (Encapsulating Security Payload, protocol 50): encrypts AND authenticates. Provides confidentiality + integrity + anti-replay. AH (Authentication Header, protocol 51): authenticates only, NO encryption. Always prefer ESP."},
{d:"D5",hot:1,q:"WPA3 improvement over WPA2 — what is the key difference?",opts:["WPA3 uses AES-256 only","WPA3 uses SAE handshake — provides forward secrecy and prevents offline dictionary attacks","WPA3 requires certificates","WPA3 eliminated pre-shared keys"],ans:1,exp:"WPA3 uses SAE (Simultaneous Authentication of Equals / Dragonfly). Cannot be used for offline dictionary attacks. Each attempt requires interacting with AP. Forward secrecy: past sessions unrecryptable even if password later compromised."},
{d:"D5",q:"What does 'login block-for 120 attempts 3 within 60' do?",opts:["Allows 3 concurrent logins","Blocks ALL logins for 120 seconds after 3 failures within 60 seconds","Sets session timeout to 120 seconds","Limits sessions to 3 concurrent"],ans:1,exp:"Brute-force protection: 3 failed attempts within 60 seconds = ALL login methods blocked for 120 seconds. Applies to console, SSH, Telnet. Prevents automated password guessing attacks."},
{d:"D5",q:"Which port security feature automatically saves learned MACs to config?",opts:["Dynamic learning","MAC flooding protection","Sticky learning (mac-address sticky)","Port locking"],ans:2,exp:"'switchport port-security mac-address sticky' learns connected MACs and saves to running config as static secure entries. If config is saved ('copy run start'), sticky MACs survive reloads — port stays locked to those devices."},
{d:"D5",q:"What attack does port security protect against?",opts:["ARP poisoning","DHCP starvation","MAC table flooding (CAM overflow attack)","STP manipulation"],ans:2,exp:"MAC flooding: attacker fills CAM table with fake MACs → switch enters fail-open → floods all traffic like hub → attacker captures everything. Port security limits MACs per port — flooding attack can only add the allowed number."},
{d:"D5",q:"TACACS+ uses which port?",opts:["UDP 1812","UDP 1813","TCP 49","UDP 161"],ans:2,exp:"TACACS+ uses TCP port 49 with full packet encryption. RADIUS uses UDP 1812 (authentication) and UDP 1813 (accounting) with password-only encryption. TACACS+ is Cisco proprietary; RADIUS is open RFC standard."},
{d:"D5",q:"WPA2-Enterprise uses which authentication method?",opts:["Pre-shared key (passphrase)","802.1X with RADIUS server — individual user credentials","SAE handshake","MAC address filtering"],ans:1,exp:"WPA2-Enterprise: 802.1X authentication. Each user logs in with unique credentials via RADIUS server. AP (authenticator) passes EAP messages between client (supplicant) and RADIUS (authentication server). More secure than PSK — individual revocation possible."},
{d:"D5",q:"Named ACLs have which advantage over numbered ACLs?",opts:["More entries allowed","Can be applied to multiple interfaces","Individual entries can be deleted by sequence number — numbered ACLs require rewriting entirely","Processed faster"],ans:2,exp:"Named ACL: 'no 20' deletes entry #20 only. '15 permit...' inserts a new entry between 10 and 20. Numbered ACLs can only be modified by deleting the whole ACL and re-entering. Named ACLs are preferred for production use."},
{d:"D5",q:"What is 'tailgating' in physical security?",opts:["Following someone's network traffic","An unauthorized person following authorized personnel through a secured door without badging","Monitoring network logs","A type of phishing"],ans:1,exp:"Tailgating (piggybacking) = physical security breach. Unauthorized person follows authorized person through secured entry without using own credentials. Prevention: mantraps (double doors), security awareness training, badge readers on entry/exit."},
{d:"D5",q:"IPv6 ACLs differ from IPv4 ACLs because:",opts:["IPv6 ACLs are numbered only","IPv6 ACLs are always NAMED; applied with 'ipv6 traffic-filter' (not 'ip access-group')","IPv6 ACLs don't have implicit deny","IPv6 ACLs filter Layer 2 only"],ans:1,exp:"IPv6 ACL differences: always named (no numbered option), applied with 'ipv6 traffic-filter [name] [in|out]', and also implicitly permit ICMPv6 neighbor discovery (NDP) which is essential for IPv6 to function."},
{d:"D5",q:"What does 'service password-encryption' do?",opts:["Encrypts all passwords with AES","Applies Type 7 (XOR obfuscation) to plaintext passwords — easily reversed but deters casual viewing","Converts all to MD5 hashes","Removes all passwords"],ans:1,exp:"Type 7 encoding is NOT real encryption — it's trivially reversible with free online tools. It prevents casual shoulder-surfing of config. Always use 'enable secret' (MD5 Type 5) for privileged access passwords."},
{d:"D5",q:"Which command displays the wildcard mask matching host 10.1.1.1 exactly?",opts:["access-list 10 permit 10.1.1.1 255.255.255.255","access-list 10 permit 10.1.1.1 0.0.0.0","access-list 10 permit host 10.1.1.1","Both B and C are correct"],ans:3,exp:"Wildcard 0.0.0.0 = exact match (all bits must match). 'host 10.1.1.1' is shorthand for '10.1.1.1 0.0.0.0'. Both are equivalent. The exam may test either form — know both."},
{d:"D5",q:"An attacker sends deceptive emails to steal credentials. This is called?",opts:["Vishing","Smishing","Phishing","Tailgating"],ans:2,exp:"Phishing = deceptive emails. Vishing = voice phishing (phone calls). Smishing = SMS phishing (text). All are social engineering — manipulating humans rather than exploiting technical vulnerabilities."},
{d:"D5",q:"What is a site-to-site VPN?",opts:["Connects individual users to corporate network","Permanent encrypted tunnel connecting TWO entire networks — transparent to end users","A wireless security protocol","A firewall feature"],ans:1,exp:"Site-to-site VPN: router-to-router (or firewall-to-firewall) tunnel connecting entire branch network to HQ. End users don't need VPN software. Remote access VPN: individual users install VPN client software (Cisco AnyConnect) to connect."},
{d:"D5",q:"'show access-lists' reveals which useful information for troubleshooting?",opts:["Which interfaces ACLs are applied to","ACL entries WITH MATCH COUNTS — showing how many packets hit each entry","Routing table entries","SNMP community strings"],ans:1,exp:"'show access-lists' shows all ACL entries plus match counts per entry. Zero matches on an expected entry = either no traffic is hitting it OR the ACL is applied wrong. Reset counts with 'clear ip access-list counters' before testing."},
{d:"D5",q:"DAI (Dynamic ARP Inspection) requires which other feature to be enabled first?",opts:["Port security","Spanning Tree","DHCP Snooping — DAI uses the DHCP binding table to validate ARP","Root Guard"],ans:2,exp:"DAI validates ARP against the DHCP Snooping binding table (MAC→IP mappings). If DHCP Snooping isn't enabled, no binding table exists → DAI can't validate. Enable DHCP Snooping FIRST, then DAI. For static IPs, use ARP ACLs."},
{d:"D5",q:"What command enables AAA on a Cisco device?",opts:["aaa enable","aaa new-model","aaa start","enable aaa"],ans:1,exp:"'aaa new-model' enables AAA and overrides line-based authentication. IMPORTANT: always configure a local fallback ('aaa authentication login default group tacacs+ local') to prevent lockout if AAA server is unreachable."},
// ═══════════════════════════════════════════════════════
// DOMAIN 6 — AUTOMATION & PROGRAMMABILITY (36 questions)
// ═══════════════════════════════════════════════════════
{d:"D6",hot:1,q:"What is the PRIMARY benefit of network automation over manual CLI management?",opts:["Cheaper hardware","Eliminates human errors, ensures consistent config, speeds up deployment to hundreds of devices simultaneously","Removes need for network engineers","Makes network faster"],ans:1,exp:"Automation eliminates human error (#1 cause of outages). Manual = one typo per device × 500 devices = many mistakes. Automation: one tested template deploys identically to all. Benefits: speed, consistency, accuracy, auditability."},
{d:"D6",hot:1,q:"In SDN, where is the control plane located?",opts:["On each individual network device (distributed)","Centralized in an SDN controller — devices only handle the data plane","In the cloud automatically","In each access switch"],ans:1,exp:"Traditional networking: distributed control plane (each device runs OSPF, STP, ARP — its own brain). SDN: control plane moved to CENTRAL CONTROLLER. Devices become 'dumb' forwarders (data plane only). Controller has network-wide view."},
{d:"D6",hot:1,q:"What does the Data Plane do?",opts:["Runs OSPF and builds routing tables","Forwards packets/frames in hardware (ASIC) based on pre-built tables — at wire speed","Manages SSH and SNMP","Decides routing paths"],ans:1,exp:"Data plane (forwarding plane) = hardware-based forwarding using tables built by the control plane. Performs: IP forwarding, frame switching, NAT, ACL filtering, QoS — all in silicon at line rate. SDN leaves data plane on devices."},
{d:"D6",hot:1,q:"What is the Northbound API in SDN?",opts:["API between controller and network devices","API between SDN CONTROLLER and APPLICATIONS — apps program the network via this API","Physical north-facing port","Out-of-band management API"],ans:1,exp:"Northbound API (NBI): controller ↔ applications ABOVE the controller. External apps (scripts, monitoring, orchestration) use NBI to program network behavior. DNA Center exposes REST API as its NBI. Southbound = controller ↔ devices below."},
{d:"D6",hot:1,q:"What is the Southbound API in SDN?",opts:["API between controller and applications","API between SDN CONTROLLER and NETWORK DEVICES below it","REST API for user management","SNMP replacement"],ans:1,exp:"Southbound API (SBI): controller ↔ network devices. Controller programs forwarding behavior on devices via SBI. Protocols: NETCONF, RESTCONF, OpenFlow, OpFlex, gRPC. DNA Center uses NETCONF/RESTCONF southbound to devices."},
{d:"D6",hot:1,q:"What is the difference between overlay and underlay in SD-Access?",opts:["Overlay = physical; underlay = virtual","Underlay = physical IP network (basic connectivity); overlay = virtual network built on top using VXLAN tunnels","They are identical","Overlay = Layer 2; underlay = Layer 3 WAN"],ans:1,exp:"Underlay = physical infrastructure providing IP connectivity between all devices. Overlay = virtual network (VXLAN tunnels) providing logical topology, segmentation, and policy enforcement on top. Fabric = underlay + overlay managed together by DNA Center."},
{d:"D6",hot:1,q:"What are the four main pillars of Cisco DNA Center?",opts:["Monitor, Configure, Secure, Optimize","Design, Policy, Provision, Assurance","Install, Configure, Test, Deploy","Plan, Build, Operate, Optimize"],ans:1,exp:"DNA Center: (1) Design — sites, IP addressing, templates. (2) Policy — group-based access, QoS. (3) Provision — auto-deploy configs (PnP zero-touch). (4) Assurance — AI-driven monitoring, health scores, RCA."},
{d:"D6",hot:1,q:"What HTTP verb is used to READ data from a REST API without modifying anything?",opts:["POST","PUT","GET","DELETE"],ans:2,exp:"HTTP verbs (CRUD): GET=Read, POST=Create, PUT=Update(replace), PATCH=Update(partial), DELETE=Remove. GET is idempotent and safe — no changes. Use GET to retrieve device configs, status, inventory."},
{d:"D6",hot:1,q:"Which HTTP status code means 'Unauthorized — authentication required'?",opts:["200","400","401","404"],ans:2,exp:"HTTP codes: 2xx=success (200=OK, 201=Created). 4xx=client error (400=Bad Request, 401=Unauthorized/auth failed, 403=Forbidden/no permission, 404=Not Found). 5xx=server error (500=Internal Server Error)."},
{d:"D6",hot:1,q:"In JSON, which characters wrap an OBJECT?",opts:["[ ] square brackets","{ } curly braces","( ) parentheses","< > angle brackets"],ans:1,exp:"JSON: { } = OBJECT (key-value pairs). [ ] = ARRAY (ordered list). Keys = strings in double quotes. Values = string, number, boolean (true/false), null, array, or object. Example: {\"name\": \"R1\", \"active\": true}"},
{d:"D6",hot:1,q:"In JSON, which characters wrap an ARRAY?",opts:["{ } curly braces","[ ] square brackets","( ) parentheses","' ' single quotes"],ans:1,exp:"JSON array: [ ] square brackets. Ordered list of values. Example: \"vlans\": [10, 20, 30]. Arrays can contain: strings, numbers, booleans, objects, or other arrays. Access by index: vlans[0]=10, vlans[1]=20."},
{d:"D6",hot:1,q:"What is wrong with this JSON value: {\"enabled\": True}?",opts:["Nothing — it's valid","'True' should be 'true' — JSON booleans are lowercase only","'enabled' needs double quotes","Curly braces are wrong"],ans:1,exp:"JSON booleans MUST be lowercase: true and false (not True/False/TRUE/FALSE). Null is also lowercase: null (not Null/NULL). Strings use double quotes only (not single). Numbers without quotes."},
{d:"D6",hot:1,q:"Ansible is described as 'agentless'. What does this mean?",opts:["It works without network connectivity","No software needs to be installed on managed devices — uses SSH to connect","It doesn't use any protocols","It only manages virtual devices"],ans:1,exp:"Ansible agentless: no agent/daemon installed on managed network devices. The Ansible control node connects via SSH (or NETCONF/REST for network devices) and pushes configuration. Simpler deployment than agent-based tools like Puppet/Chef."},
{d:"D6",hot:1,q:"What file format do Ansible playbooks use?",opts:["JSON","XML","HCL","YAML"],ans:3,exp:"Ansible playbooks = YAML (YAML Ain't Markup Language). Human-readable, indentation-based. Defines: hosts (target devices), tasks (what to do), modules (cisco.ios.ios_config for Cisco IOS). Inventory files list managed devices."},
{d:"D6",hot:1,q:"How does Terraform differ from Ansible?",opts:["Terraform uses YAML; Ansible uses HCL","Terraform = infrastructure PROVISIONING (creates resources); Ansible = configuration MANAGEMENT (configures existing devices)","Terraform is free; Ansible is paid","They are identical"],ans:1,exp:"Terraform: creates/destroys infrastructure (cloud VMs, VPCs, networks) using HCL. Tracks state. Declarative. Ansible: configures existing devices (IOS commands, VLAN configs). YAML. Push-based. Best: use Terraform to provision infrastructure, Ansible to configure it."},
{d:"D6",hot:1,q:"What does 'idempotent' mean in configuration management?",opts:["Works on all platforms","Running the same operation multiple times produces the same result — no duplicate changes or errors","Requires admin privileges","Encrypts all config changes"],ans:1,exp:"Idempotent: 'ensure VLAN 10 exists' — if VLAN 10 already exists, do nothing (don't create duplicate). Safe to run repeatedly. Terraform is fully idempotent by design. Ansible is mostly idempotent depending on modules. Key for automation reliability."},
{d:"D6",q:"What is the difference between predictive and generative AI in networking?",opts:["Predictive creates configs; generative forecasts failures","Predictive analyzes history to FORECAST future (failures, capacity); generative CREATES new content (configs, summaries, answers)","They are identical","Predictive is hardware-based; generative is software-based"],ans:1,exp:"Predictive AI: learns from historical data to forecast → 'this link will fail,' 'capacity issues Friday.' Used in DNA Center Assurance. Generative AI: creates NEW content → generates IOS configs from plain English, writes RCA reports, answers natural language queries."},
{d:"D6",q:"What HTTP status code indicates a resource was successfully CREATED?",opts:["200 OK","201 Created","204 No Content","400 Bad Request"],ans:1,exp:"201 Created = POST request succeeded and a new resource was created. The response body usually contains the new resource's details including its ID. 200 = OK (general success). 204 = success but no response body."},
{d:"D6",q:"REST API authentication: what is Basic Authentication?",opts:["Token sent with every request","Username:password encoded in Base64 sent in Authorization header — use HTTPS or credentials are exposed","Certificate-based authentication","OAuth 2.0 flow"],ans:1,exp:"Basic Auth: username:password Base64-encoded in 'Authorization: Basic [encoded]' header. Base64 is NOT encryption — easily decoded. ALWAYS use HTTPS with Basic Auth. DNA Center uses Basic Auth for initial token retrieval, then token-based."},
{d:"D6",q:"NETCONF uses which transport?",opts:["HTTPS port 443","HTTP port 80","SSH port 830","UDP 161"],ans:2,exp:"NETCONF (RFC 6241): transport = SSH on port 830 (not standard port 22). Uses XML data models (YANG). Operations: get-config, edit-config, copy-config. Used by DNA Center as southbound protocol for device configuration."},
{d:"D6",q:"Which cloud service model provides VMs, storage, and networking that you manage?",opts:["SaaS (Software as a Service)","PaaS (Platform as a Service)","IaaS (Infrastructure as a Service)","NaaS (Network as a Service)"],ans:2,exp:"IaaS: you get raw compute (VMs), storage, and networking — you manage OS, middleware, applications. PaaS: development environment provided. SaaS: complete application (Office 365, Salesforce). Network engineers primarily work with IaaS (AWS EC2, Azure VMs)."},
{d:"D6",q:"What is the purpose of Terraform's state file?",opts:["Stores passwords encrypted","Tracks current real-world state of provisioned resources — Terraform compares desired vs current state","Logs all API calls","Defines desired infrastructure configuration"],ans:1,exp:"Terraform state file (terraform.tfstate): records actual deployed resource state. When 'terraform apply' runs: desired state (HCL files) vs current state (state file) = only differences are applied. Without state file, Terraform can't know what already exists."},
{d:"D6",q:"Cisco DNA Center's 'Assurance' pillar provides what capabilities?",opts:["Only configuration backup","AI-driven monitoring: health scores, anomaly detection, root cause analysis, predictive analytics","Only network diagrams","Physical site planning only"],ans:1,exp:"DNA Center Assurance: (1) Network/client/app health scores (0-10, AI-calculated). (2) Anomaly detection (ML baseline learning). (3) Root cause analysis (event correlation). (4) Predictive analytics (forecasts issues). (5) Cisco AI Network Analytics (global telemetry comparison)."},
{d:"D6",q:"What does HTTP 404 status code mean?",opts:["Authentication failed","Server error","The requested resource was NOT FOUND","Request was malformed"],ans:2,exp:"404 Not Found = the requested URL/resource doesn't exist. Common when URL is wrong, resource was deleted, or ID doesn't exist. Client-side error (4xx). 401=Unauthorized, 403=Forbidden, 400=Bad Request, 500=Server Error."},
{d:"D6",q:"What is 'intent-based networking' (IBN)?",opts:["Configuring devices manually with CLI","Expressing desired BUSINESS OUTCOME and having the system automatically translate to device configurations","A type of routing protocol","Cisco's name for OSPF"],ans:1,exp:"IBN: express high-level intent ('Finance can access accounting servers') → DNA Center translates to configs, ACLs, and policies across all relevant devices. No need to think in terms of individual device CLI commands."},
{d:"D6",q:"What is RESTCONF?",opts:["A REST-style interface to NETCONF using HTTPS and JSON/XML — RFC 8040","SNMP replacement","A new routing protocol","Cisco proprietary VPN protocol"],ans:0,exp:"RESTCONF (RFC 8040): REST-style interface to NETCONF functionality. Uses HTTPS (port 443) with JSON or XML. Maps HTTP verbs to NETCONF operations: GET=retrieve, POST=create, PUT=replace, DELETE=remove. More developer-friendly than NETCONF."},
{d:"D6",q:"JSON data: {\"cost\": 10, \"enabled\": true, \"name\": \"Gi0/0\", \"neighbors\": null}. What is the data type of 'cost'?",opts:["String","Number","Boolean","Null"],ans:1,exp:"JSON data types: cost=10 → Number (no quotes). enabled=true → Boolean. name=\"Gi0/0\" → String (in quotes). neighbors=null → Null. Numbers in JSON are never quoted — 10 (number) vs \"10\" (string)."},
{d:"D6",q:"Puppet and Chef differ from Ansible because they:",opts:["Are free; Ansible is paid","Require AGENTS installed on managed nodes (pull model); Ansible is agentless (push model)","Use YAML; Ansible uses Python","Are open source; Ansible is proprietary"],ans:1,exp:"Puppet/Chef = agent-based (pull): agents on managed nodes check server for desired state periodically. Ansible = agentless (push): no agent needed, control node pushes via SSH. For network devices, agentless is preferred since installing agents on router/switch OS is often impossible."},
{d:"D6",q:"Which supervised machine learning use case applies to network security?",opts:["Finding unknown traffic patterns","Training on labeled 'normal' vs 'attack' samples to classify new traffic","Optimizing routes through trial and error","Generating configuration templates"],ans:1,exp:"Supervised learning: trained on labeled data where correct answers are known. Security application: train on thousands of labeled 'normal' and 'attack' traffic samples → model learns to classify new unknown traffic as normal or suspicious. Used in Cisco Stealthwatch, DNA Center, and NGFWs."},
{d:"D6",q:"What does a 'Content-Type: application/json' header tell a REST API server?",opts:["Which compression to use","The request body is JSON-formatted — parse it as JSON","Authentication credentials","API version number"],ans:1,exp:"Content-Type header specifies the format of the REQUEST BODY. 'application/json' = body is JSON. 'Accept: application/json' tells server to RESPOND in JSON. Both headers typically included in API calls with a body (POST, PUT, PATCH)."},
{d:"D6",q:"Cisco Meraki differs from DNA Center in that Meraki is:",opts:["On-premises controller hardware","Subscription-only protocol","Cloud-managed — all config from cloud dashboard, no on-premises controller hardware needed","An open-source SDN controller"],ans:2,exp:"Cisco Meraki = cloud-managed networking. All config from Meraki cloud dashboard. Devices phone home to cloud. Zero-touch provisioning built-in. DNA Center = on-premises (or virtual) controller. Meraki: simpler, SaaS-based. DNA Center: more powerful, more control, enterprise-grade."},
];

let uA={},sub={},cf='all',cd='all';
const dpColors={D1:"#5B3FD4",D2:"#0891b2",D3:"#0f766e",D4:"#b45309",D5:"#b91c1c",D6:"#7c3aed"};

function buildNav(){
  const nav=document.getElementById('dpills');
  let h=`<button class="dp active" style="background:#5B3FD4;color:#fff" onclick="setDomain('all',this)">All Domains</button>`;
  domains.forEach(d=>{
    const cnt=qs.filter(q=>q.d===d.id).length;
    h+=`<button class="dp" style="border-color:${d.color};color:${d.color}" onclick="setDomain('${d.id}',this)">${d.label} (${cnt})</button>`;
  });
  nav.innerHTML=h;
}

function rl(){
  const s=document.getElementById('search').value.toLowerCase();
  const c=document.getElementById('qlist');
  let h='',prev='',n=0;
  qs.forEach((q,i)=>{
    if(cd!=='all'&&q.d!==cd)return;
    if(cf==='correct'&&!(sub[i]&&uA[i]===q.ans))return;
    if(cf==='wrong'&&!(sub[i]&&uA[i]!==q.ans))return;
    if(cf==='unattempted'&&sub[i])return;
    if(s&&!q.q.toLowerCase().includes(s)&&!q.exp.toLowerCase().includes(s)&&!q.d.toLowerCase().includes(s))return;
    n++;
    const dc=dpColors[q.d]||'#5B3FD4';
    if(q.d!==prev){
      const dm=domains.find(d=>d.id===q.d);
      h+=`<div class="cat-h" style="background:${dc}">${dm?dm.label:q.d}</div>`;
      prev=q.d;
    }
    const iS=sub[i],iC=iS&&uA[i]===q.ans,iW=iS&&uA[i]!==q.ans;
    let cc='q-card';if(iC)cc+=' ac';if(iW)cc+=' aw';
    let badge='';
    if(iC)badge='<span class="rb rbc">✓ Correct</span>';
    else if(iW)badge='<span class="rb rbw">✗ Wrong</span>';
    else if(uA[i]!==undefined)badge='<span class="rb rbs">Selected</span>';
    h+=`<div class="${cc}" id="qc${i}">
      <div class="q-header">
        <span class="q-num">Q${i+1}${q.hot?'<span class="tag-hot">🔥</span>':''}</span>
        <span style="flex:1"></span>${badge}
        <span class="q-cat" style="background:${dc}">${q.d}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    ['A','B','C','D'].forEach((L,oi)=>{
      let cls='opt';
      if(uA[i]===oi&&!iS)cls+=' sel';
      if(iS&&oi===q.ans)cls+=' ca';
      if(iS&&uA[i]===oi&&oi!==q.ans)cls+=' wa';
      const d=iS?'style="cursor:default"':`onclick="sel(${i},${oi})"`;
      h+=`<div class="${cls}" ${d}><span class="opt-l">${L}</span>${q.opts[oi]}</div>`;
    });
    h+=`</div><div class="btn-row">
      ${!iS?`<button class="btn bs" onclick="sbQ(${i})">Submit</button>`:''}
      <button class="btn be" onclick="tgE(${i})">Explain</button>
      ${iS?`<button class="btn br" onclick="rsQ(${i})">Reset</button>`:''}
    </div>
    <div class="exp" id="ex${i}"><strong>✅ </strong>${q.exp}</div></div>`;
  });
  if(!h||n===0)h='<div style="padding:20px;text-align:center;color:#888">No matching questions found.</div>';
  c.innerHTML=h;upS();
}
function sel(i,o){if(sub[i])return;uA[i]=o;rl();}
function sbQ(i){if(uA[i]===undefined){alert('Please select an answer!');return;}sub[i]=true;rl();}
function tgE(i){const e=document.getElementById('ex'+i);if(e)e.classList.toggle('show');}
function rsQ(i){delete uA[i];delete sub[i];rl();}
function saAll(){qs.forEach((_,i)=>{if(uA[i]!==undefined)sub[i]=true;});rl();}
function raAll(){document.querySelectorAll('.exp').forEach(e=>e.classList.add('show'));}
function resetAll(){if(!confirm('Reset ALL 200 questions?'))return;uA={};sub={};rl();}
function showScore(){
  const tot=qs.length,att=Object.keys(sub).length;
  const cor=qs.filter((q,i)=>sub[i]&&uA[i]===q.ans).length;
  const pct=att>0?Math.round(cor/tot*100):0;
  const g=pct>=85?'🏆 CCNA READY — Book Your Exam!':pct>=75?'👍 Almost There — Review Weak Areas':pct>=65?'📚 Good Progress — Keep Studying':pct>=50?'🔄 More Practice Needed':'📖 Study All Domains More';
  let dscores='';
  domains.forEach(d=>{
    const dqs=qs.filter(q=>q.d===d.id);
    const dattempted=dqs.filter((_,j)=>sub[qs.indexOf(dqs[j])]);
    const dcor=dqs.filter((q,j)=>sub[qs.indexOf(dqs[j])]&&uA[qs.indexOf(dqs[j])]===q.ans).length;
    const dpct=dattempted.length>0?Math.round(dcor/dqs.length*100):0;
    dscores+=`<div class="ds"><div class="dv">${dpct}%</div>${d.label.split(':')[0]}</div>`;
  });
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=cm;
  const md=document.createElement('div');md.className='score-modal';
  md.innerHTML=`<h2>Final Exam Score</h2>
    <div class="big">${pct}%</div>
    <p style="font-size:14px;margin:6px 0">${cor} / ${tot} correct</p>
    <p style="color:#dc2626">Wrong: ${att-cor}</p>
    <p style="color:#6b7280;margin-bottom:8px">Unattempted: ${tot-att}</p>
    <p style="font-weight:700;font-size:15px;color:#5B3FD4;margin-bottom:10px">${g}</p>
    <p style="font-size:11px;font-weight:700;margin-bottom:6px">Score by Domain:</p>
    <div class="d-score">${dscores}</div>
    <p style="font-size:11px;color:#888;margin:8px 0">Real CCNA passing score ≈ 825/1000 (~82%)</p>
    <button class="gbtn gbtn-p" style="margin-top:10px" onclick="cm()">Close</button>`;
  document.body.appendChild(ov);document.body.appendChild(md);window._m=md;window._o=ov;
}
function cm(){if(window._m)window._m.remove();if(window._o)window._o.remove();}
function upS(){
  const tot=qs.length,att=Object.keys(sub).length;
  const cor=qs.filter((q,i)=>sub[i]&&uA[i]===q.ans).length;
  document.getElementById('st').textContent=tot;
  document.getElementById('sc').textContent=cor;
  document.getElementById('sw').textContent=att-cor;
  document.getElementById('su').textContent=tot-att;
  const pct=att>0?Math.round(cor/tot*100):0;
  document.getElementById('sp').textContent=pct+'%';
  document.getElementById('prog').style.width=Math.round(att/tot*100)+'%';
}
function setDomain(d,btn){
  cd=d;
  document.querySelectorAll('.dp').forEach(b=>{
    b.classList.remove('active');
    b.style.background='transparent';
    const did=b.onclick?.toString().match(/'([^']+)'/)?.[1];
    if(did&&did!=='all'){b.style.color=dpColors[did]||'#555';}
    else{b.style.color='#5B3FD4';}
  });
  btn.classList.add('active');
  btn.style.background=d==='all'?'#5B3FD4':(dpColors[d]||'#5B3FD4');
  btn.style.color='#fff';
  rl();
}
function sf(f,btn){cf=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rl();}
function af(){rl();}
buildNav();

    // Fisher-Yates shuffle
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Shuffle options and fix answer index
    function shuffleQuestions() {
      qs.forEach(q => {
        const correctAnswer = q.opts[q.ans];

        const paired = q.opts.map((opt, idx) => ({
          text: opt,
          wasCorrect: idx === q.ans
        }));

        shuffle(paired);

        q.opts = paired.map(x => x.text);
        q.ans = paired.findIndex(x => x.wasCorrect);
      });

      shuffle(qs);
    }

    // Run once when page loads
    shuffleQuestions();

rl();
