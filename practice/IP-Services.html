<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:transparent;color:var(--fg,#1a1a1a);font-size:13px;padding:10px}
h1{font-size:15px;color:var(--accent,#5B3FD4);margin-bottom:4px;border-bottom:2px solid var(--accent,#5B3FD4);padding-bottom:6px}
.stats-bar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.stat{background:var(--surface2,#f0eeff);border-radius:8px;padding:6px 14px;text-align:center;flex:1;min-width:70px}
.stat .v{font-size:18px;font-weight:800;color:var(--accent,#5B3FD4)}
.stat .l{font-size:10px;color:#888}
.stat.correct .v{color:#16a34a}
.stat.wrong .v{color:#dc2626}
.stat.skip .v{color:#d97706}
.progress-wrap{background:#e5e7eb;border-radius:10px;height:10px;margin-bottom:10px}
.progress-fill{height:10px;border-radius:10px;background:linear-gradient(90deg,#5B3FD4,#1D9E75);transition:width 0.3s}
.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:160px;padding:6px 10px;border-radius:6px;border:1.5px solid var(--accent,#5B3FD4);font-size:12px;background:var(--surface,#f8f8f8);color:var(--fg,#1a1a1a)}
.filter-btn{padding:5px 12px;border-radius:16px;border:1.5px solid #aaa;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:#555}
.filter-btn.active{background:var(--accent,#5B3FD4);color:#fff;border-color:var(--accent,#5B3FD4)}
.q-card{border:1.5px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s}
.q-card.answered-correct{border-color:#16a34a}
.q-card.answered-wrong{border-color:#dc2626}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 6px;gap:10px;flex-wrap:wrap}
.q-num{font-weight:800;color:var(--accent,#5B3FD4);font-size:12px;flex-shrink:0}
.q-category{font-size:10px;background:var(--accent,#5B3FD4);color:#fff;border-radius:10px;padding:2px 8px;flex-shrink:0}
.q-text{padding:0 14px 10px;font-weight:600;font-size:13px;line-height:1.5}
.options{padding:0 14px 10px;display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-radius:7px;border:1.5px solid #e5e7eb;cursor:pointer;transition:all 0.15s;line-height:1.4}
.opt:hover{border-color:var(--accent,#5B3FD4);background:var(--surface2,#f0eeff)}
.opt.selected{border-color:var(--accent,#5B3FD4);background:var(--surface2,#f0eeff)}
.opt.correct-ans{border-color:#16a34a;background:#f0fdf4;font-weight:700}
.opt.wrong-ans{border-color:#dc2626;background:#fef2f2}
.opt-letter{font-weight:800;color:var(--accent,#5B3FD4);flex-shrink:0;width:16px}
.opt.correct-ans .opt-letter{color:#16a34a}
.opt.wrong-ans .opt-letter{color:#dc2626}
.explanation{margin:0 14px 12px;padding:10px 12px;border-radius:7px;background:var(--surface2,#f0faf8);border-left:4px solid #1D9E75;font-size:12px;line-height:1.6;display:none}
.explanation.show{display:block}
.explanation strong{color:#1D9E75}
.btn-row{display:flex;gap:8px;padding:0 14px 12px;flex-wrap:wrap}
.btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn-submit{background:var(--accent,#5B3FD4);color:#fff}
.btn-show{background:#1D9E75;color:#fff}
.btn-reset-q{background:#e5e7eb;color:#555}
.result-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.rb-correct{background:#dcfce7;color:#16a34a}
.rb-wrong{background:#fee2e2;color:#dc2626}
.global-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.gbtn{padding:6px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700}
.gbtn-primary{background:var(--accent,#5B3FD4);color:#fff}
.gbtn-green{background:#16a34a;color:#fff}
.gbtn-red{background:#dc2626;color:#fff}
.gbtn-gray{background:#6b7280;color:#fff}
.tag-hot{background:#e05a2b;color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;margin-left:4px}
.cat-header{background:var(--surface2,#f0eeff);padding:6px 14px;font-weight:700;font-size:12px;color:var(--accent,#5B3FD4);border-bottom:1px solid #e5e7eb;letter-spacing:0.5px}
.score-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.3);z-index:100;text-align:center;min-width:280px;max-width:90vw}
.score-modal h2{font-size:22px;margin-bottom:8px;color:var(--accent,#5B3FD4)}
.score-modal .big{font-size:48px;font-weight:900;color:var(--accent,#5B3FD4)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:99}
        .complete-banner {
      background: linear-gradient(135deg, #5B3FD4, #1D9E75);
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 14px;
      text-align: center;
      font-weight: 700;
      font-size: 14px
    }
</style>
</head>
<body>
    <div class="complete-banner">🏆 Domain 4: 🎯 CCNA IP Services — 100 Exam MCQ</div>
<div class="stats-bar">
  <div class="stat"><div class="v" id="s-total">100</div><div class="l">Total</div></div>
  <div class="stat correct"><div class="v" id="s-correct">0</div><div class="l">Correct</div></div>
  <div class="stat wrong"><div class="v" id="s-wrong">0</div><div class="l">Wrong</div></div>

</div>

<div class="filter-bar">
  <input type="text" id="search" placeholder="🔍 Search by topic, command, or keyword..." oninput="af()">

  <button class="filter-btn" onclick="sf('unattempted',this)">Remaining</button>

</div>
<div id="qlist"></div>
<script>
const qs=[
// ── NAT ────────────────────────────────────────────────────────────────────
{cat:"NAT",hot:1,q:"A host with private IP 192.168.1.10 accesses the internet. The router translates it to public IP 203.0.113.5. What is 192.168.1.10 called in NAT terminology?",opts:["Inside Global","Outside Local","Inside Local","Outside Global"],ans:2,exp:"NAT terms: Inside Local = private IP of the internal host AS SEEN FROM INSIDE the network (192.168.1.10). Inside Global = public IP representing the internal host on the internet (203.0.113.5). Always: Inside Local = REAL private IP, Inside Global = TRANSLATED public IP."},
{cat:"NAT",hot:1,q:"What is 'Inside Global' in NAT terminology?",opts:["The private IP address of an internal host","The public IP address representing an internal host on the internet","The IP address of an external server","The router's loopback address"],ans:1,exp:"Inside Global = the public (translated) IP address that represents an internal host on the internet. This is what external servers see as the source IP. The translation table maps Inside Local ↔ Inside Global for each session."},
{cat:"NAT",hot:1,q:"Which NAT type translates multiple private IPs to ONE public IP using unique port numbers?",opts:["Static NAT","Dynamic NAT","PAT (Port Address Translation / NAT Overload)","NAT64"],ans:2,exp:"PAT (Port Address Translation) = NAT Overload. One public IP + unique source port numbers for each session. Allows thousands of internal hosts to share ONE public IP simultaneously. Most common NAT in homes and offices. Uses 'overload' keyword."},
{cat:"NAT",hot:1,q:"Which command configures PAT using the router's WAN interface IP?",opts:["ip nat inside source list 1 pool NAT_POOL","ip nat inside source list 1 interface Gi0/1 overload","ip nat outside source list 1 interface Gi0/1","ip nat overload interface Gi0/1 list 1"],ans:1,exp:"'ip nat inside source list 1 interface Gi0/1 overload' — 'list 1' = ACL defining which IPs to translate, 'interface Gi0/1' = use this interface's IP as the public IP, 'overload' = enables PAT (many-to-one with ports). This is the complete PAT command."},
{cat:"NAT",hot:1,q:"An administrator configures NAT but translations are not appearing in 'show ip nat translations'. What should be checked FIRST?",opts:["Check if OSPF is running","Verify 'ip nat inside' and 'ip nat outside' are applied to the correct interfaces","Check VLAN configuration","Verify SSH is enabled"],ans:1,exp:"Most common NAT failure: 'ip nat inside' and 'ip nat outside' applied to WRONG interfaces or not applied at all. 'ip nat inside' MUST be on the LAN-facing interface. 'ip nat outside' MUST be on the WAN-facing interface. Swapping them or missing one completely breaks NAT."},
{cat:"NAT",q:"Which command creates a static NAT mapping for an internal web server?",opts:["ip nat inside source static 192.168.1.10 203.0.113.10","ip nat static 192.168.1.10 to 203.0.113.10","ip nat inside static 192.168.1.10 203.0.113.10","ip nat source 192.168.1.10 203.0.113.10"],ans:0,exp:"'ip nat inside source static [inside-local] [inside-global]' creates a permanent one-to-one mapping. The server at 192.168.1.10 is ALWAYS reachable as 203.0.113.10 from the internet. Used for servers needing a fixed public IP (web, mail, FTP servers)."},
{cat:"NAT",q:"What does the 'show ip nat translations' command display?",opts:["The NAT configuration only","Active NAT translation entries — Inside Local, Inside Global, Outside Local, Outside Global","Only static NAT entries","Only PAT port mappings"],ans:1,exp:"'show ip nat translations' shows the active NAT table: Protocol, Inside Local (private IP:port), Inside Global (public IP:port), Outside Local (destination as seen inside), Outside Global (real destination IP). Empty = no active translations (no traffic flowing)."},
{cat:"NAT",q:"What is Dynamic NAT and how does it differ from Static NAT?",opts:["Dynamic NAT uses ports; Static NAT does not","Dynamic NAT assigns public IPs from a pool on a first-come basis; Static NAT permanently maps one private to one public IP","Dynamic NAT is more secure than Static NAT","Dynamic NAT only works with TCP; Static NAT works with all protocols"],ans:1,exp:"Static NAT: permanent 1-to-1 mapping (same public IP always). Dynamic NAT: public IPs assigned from a pool dynamically as needed — when a host needs internet access, it gets the next available pool IP. When done, the IP returns to the pool. If pool is exhausted, new connections fail."},
{cat:"NAT",hot:1,q:"Which command clears ALL NAT translation table entries?",opts:["clear ip nat table","clear ip nat translation *","no ip nat translations","clear nat translations all"],ans:1,exp:"'clear ip nat translation *' clears all dynamic NAT/PAT entries from the translation table. Required when troubleshooting NAT or when reconfiguring NAT — stale entries prevent new translations from working correctly. Static entries are NOT cleared by this command."},
{cat:"NAT",q:"In PAT, what makes each internal host's session unique when they share the same public IP?",opts:["Different TTL values","Unique source port numbers assigned by the router","Different DSCP markings","Different MAC addresses"],ans:1,exp:"PAT tracks sessions using: {Protocol + Public-IP + Unique-Source-Port}. Router assigns a unique source port (from 1024-65535) to each internal host's connection. Return traffic matches the port number to the correct internal host. This allows 60,000+ simultaneous sessions per public IP."},
{cat:"NAT",q:"What is the purpose of 'ip nat inside' configured on an interface?",opts:["Enables NAT on the entire router","Marks this interface as the INSIDE (private/LAN) side of NAT translation","Sets up a NAT pool","Configures PAT overload"],ans:1,exp:"'ip nat inside' marks the interface as the inside (LAN-facing) interface. Packets leaving this interface toward 'outside' have their source IP translated. BOTH 'ip nat inside' AND 'ip nat outside' are REQUIRED — NAT only works between inside and outside interfaces."},
{cat:"NAT",q:"How does a router handle return traffic in PAT when the destination is the public IP?",opts:["Drops it — can't determine the internal host","Uses the destination port number to look up the NAT translation table and forwards to the correct internal host","Broadcasts to all internal hosts","Sends it to the default gateway"],ans:1,exp:"Return traffic arrives at the public IP with a specific destination port. The router checks the NAT translation table: {protocol + public-IP + port} → maps back to {private-IP + original-port}. The router replaces the destination with the private IP and forwards internally."},
// ── DHCP ───────────────────────────────────────────────────────────────────
{cat:"DHCP",hot:1,q:"What is the correct order of the DHCP DORA process?",opts:["Offer → Discover → Request → Acknowledge","Discover → Offer → Request → Acknowledge","Request → Discover → Offer → Acknowledge","Discover → Request → Offer → Acknowledge"],ans:1,exp:"DHCP DORA: (1) Discover — client broadcasts to find DHCP servers (src: 0.0.0.0, dst: 255.255.255.255), (2) Offer — server offers an IP, (3) Request — client requests that specific IP (still broadcast), (4) Acknowledge — server confirms the lease. Memory: DORA like the explorer."},
{cat:"DHCP",hot:1,q:"Which UDP ports does DHCP use?",opts:["UDP 53 and 68","UDP 67 (server) and 68 (client)","UDP 67 and 69","TCP 67 and 68"],ans:1,exp:"DHCP server listens on UDP 67. DHCP client listens on UDP 68. Discover and Request are broadcast (src port 68 → dst port 67). Offer and ACK are sent from port 67 to port 68. Memory: server=67 (lower), client=68 (higher, comes after)."},
{cat:"DHCP",hot:1,q:"A host gets IP 169.254.45.10 after booting. What does this indicate?",opts:["The DHCP server assigned this IP","The host has a static IP configuration","DHCP failed — the host self-assigned an APIPA address","This is a valid private IP from the DHCP pool"],ans:2,exp:"169.254.0.0/16 = APIPA (Automatic Private IP Addressing). Windows assigns this when DHCP discovery fails (no server responded). The host can only communicate with other APIPA hosts on the same subnet — no internet, no inter-VLAN. Fix: check DHCP server, check ip helper-address."},
{cat:"DHCP",hot:1,q:"A router interface connects to clients needing DHCP from a server on a DIFFERENT subnet. Which command enables DHCP relay?",opts:["ip dhcp-relay 10.1.1.100","ip helper-address 10.1.1.100","ip dhcp forward 10.1.1.100","service dhcp-relay 10.1.1.100"],ans:1,exp:"'ip helper-address 10.1.1.100' configured on the ROUTER INTERFACE FACING CLIENTS converts DHCP broadcasts to unicast and forwards to the server. Without this, broadcasts from clients never reach a DHCP server on another subnet. One of the most tested commands in Domain 4."},
{cat:"DHCP",hot:1,q:"Which command must be configured BEFORE defining a DHCP pool to reserve IPs for routers and servers?",opts:["ip dhcp pool","ip dhcp reserve","ip dhcp excluded-address 192.168.1.1 192.168.1.20","no ip dhcp conflict"],ans:2,exp:"'ip dhcp excluded-address [start] [end]' MUST be configured FIRST. This prevents the DHCP server from assigning those IPs. Configure BEFORE the pool so reserved IPs (router, server, printer) are never leased to clients. Forgetting this is a common real-world mistake."},
{cat:"DHCP",q:"Which DHCP pool command specifies the default gateway sent to clients?",opts:["gateway 192.168.1.1","default-router 192.168.1.1","ip default-gateway 192.168.1.1","route 192.168.1.1"],ans:1,exp:"'default-router [IP]' inside DHCP pool config sends the gateway IP to clients. Without this, clients get an IP but can't reach other networks. 'ip default-gateway' is a different command used on SWITCHES for their own management traffic."},
{cat:"DHCP",q:"What does 'show ip dhcp binding' display?",opts:["DHCP pool configuration","Active leases — MAC address to IP address assignments with expiry times","DHCP conflicts","DHCP server statistics"],ans:1,exp:"'show ip dhcp binding' shows all active DHCP leases: client MAC address, assigned IP, lease expiry, and type (Automatic/Manual). Use this to find which device has which IP and to troubleshoot IP conflicts."},
{cat:"DHCP",q:"Which command on a router interface configures it to obtain its IP from a DHCP server?",opts:["ip address dhcp","ip dhcp client","dhcp enable","ip address auto"],ans:0,exp:"'ip address dhcp' (under interface config) makes the router a DHCP CLIENT on that interface. The router sends a DHCP Discover and gets an IP from a server. Common on ISP-connected router interfaces where the ISP provides IP addressing via DHCP."},
{cat:"DHCP",q:"What information does a DHCP server typically provide to clients? (Best answer)",opts:["IP address only","IP address, subnet mask, default gateway, DNS server, and lease duration","IP address and DNS only","IP address, gateway, and MAC address"],ans:1,exp:"DHCP provides: (1) IP address, (2) Subnet mask, (3) Default gateway, (4) DNS server IPs, (5) Lease duration, (6) Domain name. Additional options: NTP server, TFTP server, WINS server. These are DHCP options sent in the Offer and ACK packets."},
{cat:"DHCP",q:"A DHCP server shows conflicts in 'show ip dhcp conflict'. What caused this?",opts:["The DHCP pool is too small","An IP address offered by DHCP was already in use by another device (static IP conflict)","The DHCP server is overloaded","Wrong subnet mask in the pool"],ans:1,exp:"DHCP conflict = an IP the server tried to assign is already in use (by a device with a static IP). The server pings the IP before assigning it — if it gets a reply, it records a conflict and skips that IP. Fix: use 'ip dhcp excluded-address' for all static IP devices."},
{cat:"DHCP",q:"What is the default DHCP lease duration on a Cisco router?",opts:["24 hours","48 hours","1 day (24 hours)","1 day is the IOS default"],ans:3,exp:"The default DHCP lease on Cisco IOS = 1 day (24 hours). Configure with 'lease [days] [hours] [minutes]' or 'lease infinite'. Shorter leases = better IP pool reclamation (for guest networks). Longer leases = fewer DHCP renewals (for stable corporate networks)."},
// ── DNS ────────────────────────────────────────────────────────────────────
{cat:"DNS",hot:1,q:"Which DNS record type maps a hostname to an IPv4 address?",opts:["AAAA","MX","A","PTR"],ans:2,exp:"DNS record types: A = hostname → IPv4 address (most common). AAAA = hostname → IPv6 address. MX = mail server for domain. PTR = reverse lookup (IP → hostname). CNAME = alias → canonical name. NS = authoritative name server."},
{cat:"DNS",q:"Which port does DNS use for standard queries?",opts:["TCP 53 only","UDP 53 only","UDP 53 for queries; TCP 53 for zone transfers and large responses","TCP 443"],ans:2,exp:"DNS uses BOTH TCP and UDP on port 53. UDP 53 = standard queries (fast, small responses under 512 bytes). TCP 53 = zone transfers between DNS servers and responses exceeding 512 bytes. Modern DNS (EDNS) can use UDP for larger responses too."},
{cat:"DNS",q:"What command on a Cisco router specifies the DNS server to use for hostname resolution?",opts:["ip domain-lookup 8.8.8.8","ip name-server 8.8.8.8","dns-server 8.8.8.8","ip dns-server 8.8.8.8"],ans:1,exp:"'ip name-server 8.8.8.8' configures the DNS server IP. Multiple servers can be specified: 'ip name-server 8.8.8.8 8.8.4.4'. Also need 'ip domain-lookup' (enabled by default) to allow DNS resolution."},
{cat:"DNS",q:"What does 'no ip domain-lookup' accomplish on a Cisco router?",opts:["Disables all IP routing","Prevents the router from trying to DNS-resolve mistyped commands (stops long pauses)","Removes all DNS server entries","Disables the DNS server service"],ans:1,exp:"'no ip domain-lookup' stops the router from broadcasting DNS queries when you mistype a command. Without it, a typo like 'shwo' causes a 30-second DNS lookup pause. This is standard in lab configs to speed up the CLI. Re-enable with 'ip domain-lookup'."},
{cat:"DNS",q:"Which DNS record type is used for reverse DNS lookups (IP address to hostname)?",opts:["A record","AAAA record","PTR record","MX record"],ans:2,exp:"PTR (Pointer) record = reverse DNS lookup. Maps an IP address back to a hostname. Used for email spam filtering, logging, and security. Stored in the in-addr.arpa domain. Example: 8.8.8.8 PTR → dns.google."},
// ── NTP ────────────────────────────────────────────────────────────────────
{cat:"NTP",hot:1,q:"An NTP server has stratum level 2. What does this mean?",opts:["It is two hops from an atomic clock (stratum 0 reference)","It has the second-highest priority","It synchronizes every 2 seconds","It supports 2 clients"],ans:0,exp:"NTP Stratum = distance from authoritative time source. Stratum 0 = atomic clock/GPS (reference). Stratum 1 = directly connected to stratum 0. Stratum 2 = syncs from stratum 1. Each hop adds 1. Stratum 16 = unsynchronized. Lower = more accurate."},
{cat:"NTP",hot:1,q:"Which command makes a Cisco router an NTP server with stratum level 3?",opts:["ntp server 3","ntp master 3","ntp stratum 3","ntp enable level 3"],ans:1,exp:"'ntp master [stratum]' makes the router an NTP server. 'ntp master 3' sets it as stratum 3. Other devices syncing from this router become stratum 4. If no stratum specified, default is stratum 8. Use when no external NTP source is available."},
{cat:"NTP",hot:1,q:"What does 'show ntp status' display when NTP is working correctly?",opts:["'NTP disabled'","'Clock is synchronized, stratum X, reference is [server IP]'","'NTP server not found'","'Stratum 16 — unsynchronized'"],ans:1,exp:"'Clock is synchronized' = NTP working. Shows current stratum and reference server IP. 'unsynchronized' or stratum 16 = NTP not working. Check: 'show ntp associations' to see server status (* = currently synced source)."},
{cat:"NTP",q:"Which NTP UDP port is used for time synchronization?",opts:["UDP 69","UDP 123","UDP 161","TCP 123"],ans:1,exp:"NTP uses UDP port 123. UDP is appropriate because NTP packets are small and timing is more important than guaranteed delivery. If an NTP packet is lost, the next one arrives within seconds."},
{cat:"NTP",q:"An organization wants to prevent a rogue device from acting as an NTP server. Which feature should be configured?",opts:["NTP access-list","NTP authentication with trusted keys","NTP version 4 only","NTP broadcast mode"],ans:1,exp:"NTP authentication: configure 'ntp authenticate', 'ntp authentication-key 1 md5 [key]', 'ntp trusted-key 1'. Clients only accept time from servers presenting the correct MD5 key. Prevents rogue time sources from poisoning network time."},
{cat:"NTP",q:"What is the result of 'show ntp associations' showing '~' next to a server address?",opts:["The server is the current sync source","The server is configured but not yet synced","The server is rejected","The server uses NTPv2"],ans:1,exp:"NTP association symbols: * = current sync source (selected), + = candidate (good, not selected), ~ = configured (not yet evaluated/synced), - = discarded. You want to see * next to your primary NTP server IP."},
{cat:"NTP",q:"Which command synchronizes a Cisco router to an NTP server at 216.239.35.0?",opts:["ntp master 216.239.35.0","ntp server 216.239.35.0","ntp client 216.239.35.0","ntp sync 216.239.35.0"],ans:1,exp:"'ntp server [IP]' configures the router as an NTP CLIENT that syncs from the specified server. Multiple servers can be configured for redundancy. Add 'prefer' for the primary: 'ntp server 216.239.35.0 prefer'"},
// ── SNMP ───────────────────────────────────────────────────────────────────
{cat:"SNMP",hot:1,q:"What are the three versions of SNMP and their security levels?",opts:["v1=basic, v2=moderate, v3=not secure","v1=community string, v2c=community string, v3=username+auth+encryption","v1=MD5, v2=SHA, v3=AES","v1=UDP, v2=TCP, v3=TLS"],ans:1,exp:"SNMP versions: v1 = community strings (cleartext), no bulk operations. v2c = community strings (cleartext) + GetBulk for efficiency. v3 = usernames + optional MD5/SHA authentication + optional AES/DES encryption. Only v3 provides real security."},
{cat:"SNMP",hot:1,q:"SNMP uses which ports?",opts:["TCP 161 and TCP 162","UDP 161 (agent receives polls) and UDP 162 (NMS receives traps)","UDP 161 only","TCP 514 and UDP 161"],ans:1,exp:"SNMP port 161 (UDP): NMS sends GET/SET requests to the agent. Agent listens here. SNMP port 162 (UDP): NMS listens here for TRAP/INFORM notifications from agents. Remember: 161 = polling (NMS→agent), 162 = traps (agent→NMS)."},
{cat:"SNMP",hot:1,q:"What is the difference between an SNMP Trap and an SNMP Inform?",opts:["Traps use TCP; Informs use UDP","Trap = no acknowledgment (fire and forget); Inform = acknowledged by NMS (reliable delivery)","Traps are v1 only; Informs are v3 only","No difference — they are the same"],ans:1,exp:"SNMP Trap (v1/v2c/v3): agent sends notification to NMS, no acknowledgment — if lost, it's gone. SNMP Inform (v2c+): agent sends notification AND waits for acknowledgment from NMS — if not acknowledged, retransmits. Informs are more reliable but use more resources."},
{cat:"SNMP",q:"What is the SNMP MIB?",opts:["A security key for SNMP v3","Management Information Base — a database of manageable objects on a network device","The NMS software platform","The SNMP community string storage"],ans:1,exp:"MIB (Management Information Base) = the hierarchical database of all manageable variables on a device. Each object has a unique OID (Object Identifier). Examples: sysUpTime, ifOperStatus, ifInOctets. The NMS queries specific OIDs to get device information."},
{cat:"SNMP",q:"Which SNMPv2c community string command creates READ-ONLY access?",opts:["snmp-server community PUBLIC rw","snmp-server community PUBLIC ro","snmp-server community PUBLIC read","snmp-server read-only PUBLIC"],ans:1,exp:"'snmp-server community [string] ro' = read-only. NMS can GET values but NOT SET (change) them. 'rw' = read-write, NMS can GET and SET. Best practice: use 'ro' unless you need remote configuration via SNMP. Always use strong, non-obvious community strings."},
{cat:"SNMP",hot:1,q:"Which SNMPv3 security level provides BOTH authentication AND encryption?",opts:["noAuthNoPriv","authNoPriv","authPriv","securePriv"],ans:2,exp:"SNMPv3 security levels: noAuthNoPriv = no auth, no encryption (like v1/v2c). authNoPriv = MD5/SHA authentication but no encryption. authPriv = MD5/SHA authentication AND AES/DES encryption. Only authPriv is truly secure — use in production."},
{cat:"SNMP",q:"What does the SNMP GET command do?",opts:["Sends an alert to the NMS","Requests the value of a specific MIB object from an agent","Sets a MIB object value on the agent","Retrieves the entire MIB from the device"],ans:1,exp:"SNMP GET: NMS requests the current value of a specific OID (MIB object) from the agent. Example: GET sysUpTime.0 returns how long the device has been running. GETNEXT retrieves the next OID. GETBULK (v2c+) retrieves multiple values efficiently."},
{cat:"SNMP",q:"An SNMP agent proactively sends an alert to the NMS when a link goes down. What type of SNMP message is this?",opts:["GET","SET","TRAP","RESPONSE"],ans:2,exp:"SNMP Trap = an unsolicited notification from the agent to the NMS. The agent doesn't wait to be asked — when an event occurs (link down, high CPU, fan failure), it immediately sends a trap to the NMS. This is proactive monitoring."},
// ── SYSLOG ─────────────────────────────────────────────────────────────────
{cat:"Syslog",hot:1,q:"What is the correct order of Syslog severity levels from most severe to least severe?",opts:["Debug → Info → Notice → Warning → Error → Critical → Alert → Emergency","Emergency → Alert → Critical → Error → Warning → Notice → Informational → Debug","Warning → Error → Critical → Debug → Info → Alert → Emergency → Notice","Info → Debug → Notice → Warning → Error → Emergency → Critical → Alert"],ans:1,exp:"Syslog severity 0-7: Emergency(0), Alert(1), Critical(2), Error(3), Warning(4), Notice(5), Informational(6), Debug(7). Memory trick: 'Every Awful Cisco Engineer Will Need Debug' = Emergency, Alert, Critical, Error, Warning, Notice (Notification), Informational, Debug."},
{cat:"Syslog",hot:1,q:"A router is configured with 'logging trap warnings'. Which severity levels are sent to the syslog server?",opts:["Only level 4 (Warning)","Levels 0-4 (Emergency through Warning)","Levels 4-7 (Warning through Debug)","All levels 0-7"],ans:1,exp:"'logging trap warnings' sets the THRESHOLD at level 4. Levels 0-4 (more severe: Emergency, Alert, Critical, Error, Warning) ARE sent. Levels 5-7 (less severe: Notice, Info, Debug) are NOT sent. Rule: configured level AND all levels LOWER (more critical) are logged."},
{cat:"Syslog",hot:1,q:"Which Syslog severity level should be used for routine informational messages that aren't errors?",opts:["Level 0 — Emergency","Level 3 — Error","Level 6 — Informational","Level 7 — Debug"],ans:2,exp:"Level 6 (Informational) = normal operational messages that are noteworthy but not problems. Examples: interface coming up, OSPF neighbor formed, user logged in. Level 7 (Debug) = very detailed troubleshooting output, huge volume — only for debugging."},
{cat:"Syslog",q:"What does the command 'service timestamps log datetime msec' accomplish?",opts:["Sets the syslog server IP","Adds date, time, and milliseconds to all log messages","Sets log buffer size","Configures syslog trap level"],ans:1,exp:"'service timestamps log datetime msec' adds a timestamp (date + time + milliseconds) to every log message. Without timestamps, log entries are nearly useless for troubleshooting — you can't correlate events. Critical for production networks and incident analysis."},
{cat:"Syslog",q:"What UDP port does Syslog use to send messages to a syslog server?",opts:["UDP 161","UDP 162","UDP 514","TCP 514"],ans:2,exp:"Syslog uses UDP port 514. UDP is used because log messages don't require guaranteed delivery — if a syslog packet is lost, the network activity continues. TCP syslog (port 514 or 6514) is also supported for reliable delivery but adds overhead."},
{cat:"Syslog",q:"Which command sends syslog messages to an external server at 10.1.1.200?",opts:["logging 10.1.1.200","logging host 10.1.1.200","syslog server 10.1.1.200","logging trap 10.1.1.200"],ans:1,exp:"'logging host 10.1.1.200' configures the router to send syslog messages to an external syslog server. The server stores messages persistently (survives reboots). Also need 'logging trap [level]' to set which severity to forward."},
{cat:"Syslog",hot:1,q:"A syslog message reads: '%OSPF-5-ADJCHG: Process 1, Nbr 2.2.2.2 on Gi0/0 from LOADING to FULL'. What is the severity level?",opts:["Level 1 — Alert","Level 3 — Error","Level 5 — Notice","Level 7 — Debug"],ans:2,exp:"Syslog message format: %FACILITY-SEVERITY-MNEMONIC: message. In '%OSPF-5-ADJCHG', the '5' = severity level 5 (Notice). This is a normal but significant event — OSPF adjacency changed to FULL. Level 5 = normal significant events."},
{cat:"Syslog",q:"Which command allows you to see syslog messages during an active SSH session?",opts:["logging console all","show logging","terminal monitor","logging monitor all"],ans:2,exp:"'terminal monitor' (run in the SSH/Telnet session itself) enables log messages to appear in your remote session. Without it, messages only show on the physical console. 'logging monitor informational' (global config) sets the level, but 'terminal monitor' is needed to actually see them."},
{cat:"Syslog",q:"What is stored in the local log buffer and how do you view it?",opts:["Running config — 'show running-config'","Recent syslog messages stored in RAM — view with 'show logging'","CDP neighbor info — 'show cdp neighbors'","Interface statistics — 'show interfaces'"],ans:1,exp:"'logging buffered [size] [level]' stores recent syslog messages in router RAM. View with 'show logging'. Buffer contents are LOST on reboot — use an external syslog server for permanent storage. Useful for quick on-device troubleshooting."},
// ── QoS ────────────────────────────────────────────────────────────────────
{cat:"QoS",hot:1,q:"What is the difference between QoS Policing and QoS Shaping?",opts:["Policing buffers excess traffic; Shaping drops it","Policing drops (or re-marks) excess traffic immediately; Shaping buffers and delays excess traffic","They are identical","Policing is for inbound; Shaping is for outbound only in different ways"],ans:1,exp:"Policing: traffic exceeding the rate is DROPPED (or re-marked) immediately. No delay added. Used for rate limiting (ISP enforcing customer SLA). Shaping: excess traffic is BUFFERED and sent later — smooths traffic, adds delay but fewer drops. Used before sending to ISP."},
{cat:"QoS",hot:1,q:"Which QoS method combines a strict priority queue (for voice) with class-based queuing (for data)?",opts:["FIFO","CBWFQ","LLQ (Low Latency Queuing)","WFQ"],ans:2,exp:"LLQ (Low Latency Queuing) = CBWFQ + strict Priority Queue. Voice goes in the strict PQ (always served first, guaranteed low latency). Data classes go in CBWFQ (guaranteed minimum bandwidth). LLQ is the recommended QoS method for networks with voice traffic."},
{cat:"QoS",hot:1,q:"Which DSCP value is used to mark voice payload (VoIP RTP) traffic?",opts:["CS0 (0)","AF41 (34)","EF (46)","CS3 (24)"],ans:2,exp:"DSCP EF (Expedited Forwarding) = value 46 = voice payload (RTP). Voice signaling uses CS3 (24). Interactive video uses AF41 (34). Best effort (default) uses CS0 (0). EF provides the lowest latency and jitter — always maps to the strict priority queue in LLQ."},
{cat:"QoS",q:"What is the first step in implementing QoS on a network?",opts:["Configure queuing","Mark all traffic with DSCP","Classify traffic — identify what type of traffic each packet is","Apply policing"],ans:2,exp:"QoS implementation order: (1) Classify — identify traffic type (ACL, NBAR, DSCP marking). (2) Mark — add DSCP/CoS tags. (3) Queue — put in appropriate queue. (4) Manage congestion — schedule/police/shape. Classification is ALWAYS first."},
{cat:"QoS",q:"What does DSCP stand for and where is it located in a packet?",opts:["Dynamic Service Class Protocol — in the TCP header","Differentiated Services Code Point — in the IP header (6-bit field)","Data Stream Control Point — in the Ethernet frame","Delay Sensitive Class Priority — in the UDP header"],ans:1,exp:"DSCP = Differentiated Services Code Point. Located in the IP header's DS (Differentiated Services) byte — 6 bits allowing 64 values (0-63). Replaces the older 3-bit IP Precedence. All routers/switches along the path read DSCP to apply appropriate treatment."},
{cat:"QoS",q:"What is 'tail drop' and why is it considered problematic?",opts:["Drops the first packet — causes TCP slow start","Drops ALL packets when the queue is full — causes TCP global synchronization","Only drops UDP packets","Drops packets based on DSCP marking"],ans:1,exp:"Tail drop = when a queue is full, ALL new packets are dropped. Problem: all TCP flows experience loss simultaneously → all back off together → all burst together = TCP global synchronization. Fix: use RED (Random Early Detection) or WRED which drops packets BEFORE the queue fills, staggering TCP backoffs."},
{cat:"QoS",q:"Which QoS marking is used at Layer 2 (inside the 802.1Q VLAN tag)?",opts:["DSCP","IP Precedence","CoS (Class of Service) — 3-bit PCP field","MPLS EXP bits"],ans:2,exp:"CoS (Class of Service) = 3-bit PCP (Priority Code Point) field inside the 802.1Q VLAN tag. Values 0-7. Set with 'set cos [value]'. Layer 2 marking — only exists while the frame has a VLAN tag (on trunk links). Mapped to DSCP at Layer 3 boundaries."},
{cat:"QoS",hot:1,q:"Voice traffic requires which QoS characteristics to ensure call quality?",opts:["High bandwidth, high jitter tolerance","Less than 150ms one-way delay, less than 30ms jitter, less than 1% packet loss","More than 1Mbps per call, no delay requirements","Low bandwidth, high loss tolerance"],ans:1,exp:"VoIP quality requirements: One-way delay < 150ms (perceptible above this), Jitter < 30ms (variation in delay), Packet loss < 1% (causes clicks/dropouts). These drive the need for LLQ — voice in strict priority queue with guaranteed bandwidth and lowest delay."},
{cat:"QoS",q:"What is the purpose of WRED (Weighted Random Early Detection)?",opts:["Guarantees bandwidth to specific classes","Randomly drops lower-priority packets before queues fill to prevent TCP global synchronization","Marks all packets with DSCP EF","Shapes traffic to ISP rate"],ans:1,exp:"WRED = improved RED. Starts randomly dropping packets BEFORE the queue fills (configurable thresholds). 'Weighted' means higher-priority traffic (higher DSCP) has a lower drop probability. This staggers TCP backoffs, preventing all flows from stopping simultaneously."},
// ── SSH ────────────────────────────────────────────────────────────────────
{cat:"SSH & Remote Access",hot:1,q:"What is the minimum RSA key size required for SSH version 2?",opts:["512 bits","768 bits","1024 bits","2048 bits"],ans:2,exp:"SSH version 2 requires a MINIMUM RSA key of 1024 bits. Recommended: 2048 bits for better security. The key is generated with: 'crypto key generate rsa modulus 2048'. Requires hostname and ip domain-name first. Smaller keys are rejected by SSHv2."},
{cat:"SSH & Remote Access",hot:1,q:"In what order must these commands be configured to enable SSH? (Correct sequence)",opts:["RSA keys → hostname → domain name → SSH version","hostname → ip domain-name → crypto key generate rsa → ip ssh version 2","ip ssh version 2 → hostname → domain name → RSA keys","domain name → RSA keys → hostname → ip ssh version 2"],ans:1,exp:"Correct SSH setup order: (1) hostname [name] — needed for key label. (2) ip domain-name [domain] — combined with hostname for key identification. (3) crypto key generate rsa modulus 2048 — generates keys using hostname.domain as label. (4) ip ssh version 2 — enforce SSHv2 only."},
{cat:"SSH & Remote Access",q:"What is the difference between 'transport input ssh' and 'transport input telnet' on VTY lines?",opts:["'ssh' uses UDP; 'telnet' uses TCP","'transport input ssh' allows ONLY SSH (encrypted); 'telnet' allows ONLY Telnet (cleartext)","They are functionally identical","'ssh' requires a password; 'telnet' does not"],ans:1,exp:"'transport input ssh' = ONLY SSH connections accepted on VTY lines. Telnet rejected. 'transport input telnet' = only Telnet (cleartext — insecure). 'transport input ssh telnet' = allows both. Best practice: always 'transport input ssh' only in production."},
{cat:"SSH & Remote Access",q:"Which command verifies SSH is enabled and shows the current SSH version?",opts:["show ssh sessions","show ip ssh","show crypto key","show line vty"],ans:1,exp:"'show ip ssh' displays: SSH enabled/disabled status, SSH version (2.0 preferred), authentication timeout, and maximum retries. If it shows 'SSH Disabled', check: hostname configured? ip domain-name configured? RSA keys generated?"},
// ── FTP/TFTP ───────────────────────────────────────────────────────────────
{cat:"FTP & TFTP",hot:1,q:"What are the key differences between FTP and TFTP?",opts:["FTP uses UDP; TFTP uses TCP","FTP uses TCP (ports 20/21), has authentication, supports directory listing; TFTP uses UDP (port 69), no authentication, simple get/put only","FTP is faster; TFTP is slower","TFTP supports encryption; FTP does not"],ans:1,exp:"FTP: TCP ports 20(data)/21(control), username/password auth, full directory operations. TFTP: UDP port 69, NO authentication, only get and put. TFTP is simpler and used for device image/config transfers in controlled environments (no security needed)."},
{cat:"FTP & TFTP",q:"Which protocol is MOST commonly used to upload a new IOS image to a Cisco router?",opts:["HTTP","FTP or TFTP","SCP only","SFTP"],ans:1,exp:"TFTP is most commonly used for IOS upgrades in labs and controlled environments (simple, lightweight). FTP is used when authentication and reliability are needed. Command: 'copy tftp flash' then enter server IP and filename. Verify with 'show flash'."},
{cat:"FTP & TFTP",q:"What is FTP Active mode vs Passive mode?",opts:["Active = encrypted; Passive = unencrypted","Active mode: server initiates the data connection back to client (port 20); Passive mode: client initiates both connections (firewall-friendly)","Active = faster; Passive = slower","They are identical in function"],ans:1,exp:"FTP Active: server connects BACK to client on port 20 — can fail through NAT/firewalls. FTP Passive: client initiates BOTH control (port 21) and data connections — firewall friendly. Always use Passive mode when FTP is behind NAT or firewall."},
{cat:"FTP & TFTP",q:"Which command copies the running configuration to a TFTP server?",opts:["tftp copy running-config 10.1.1.100","copy running-config tftp","save running-config tftp","backup running-config 10.1.1.100"],ans:1,exp:"'copy running-config tftp' initiates a TFTP transfer. The router prompts for the server IP and filename. Used to back up device configurations. 'copy tftp running-config' restores a config from TFTP. Remember: source → destination order."},
{cat:"FTP & TFTP",q:"TFTP uses which transport layer protocol and port?",opts:["TCP port 21","UDP port 69","TCP port 69","UDP port 21"],ans:1,exp:"TFTP = UDP port 69. UDP is appropriate for TFTP because: (1) transfers happen in controlled networks, (2) TFTP has its own simple acknowledgment mechanism, (3) no connection overhead needed. The simplicity makes it ideal for device bootstrapping."},
// ── SCENARIO ───────────────────────────────────────────────────────────────
{cat:"Scenario: IP Services",hot:1,q:"Hosts in VLAN 10 can't get DHCP addresses. The DHCP server is in VLAN 99. The router has SVIs for both VLANs. What is MOST likely missing?",opts:["DHCP pool not configured","'ip helper-address [DHCP server IP]' missing on the VLAN 10 SVI interface","Wrong subnet mask in DHCP pool","NTP not configured"],ans:1,exp:"DHCP uses broadcasts. Broadcasts don't cross subnet boundaries. The VLAN 10 SVI interface needs 'ip helper-address [server-IP]' to convert DHCP broadcasts to unicast and forward to the DHCP server in VLAN 99. Without this, Discover packets never reach the server."},
{cat:"Scenario: IP Services",hot:1,q:"'Show ip nat translations' is empty but hosts can ping the default gateway. What is the problem?",opts:["NAT is not configured","Hosts are pinging the local gateway — no NAT needed for local traffic. The issue is internet access — check if hosts can reach external IPs","DHCP is not working","DNS is failing"],ans:1,exp:"NAT translations only appear for traffic crossing inside↔outside interfaces. Pinging the local gateway (inside network) doesn't require NAT. For internet access to generate translations, hosts must send traffic TO the outside. Check: ACL matching correct IPs, inside/outside interfaces correct."},
{cat:"Scenario: IP Services",q:"A router's clock shows wrong time after reload. NTP is configured. 'Show ntp status' shows 'unsynchronized'. What should be checked?",opts:["Check OSPF neighbors","Verify NTP server is reachable (ping), check 'show ntp associations' for * next to server","Check VLAN config","Check ACL blocking NTP"],ans:1,exp:"NTP troubleshooting: (1) Can the router reach the NTP server? 'ping [NTP-server-IP]'. (2) 'show ntp associations' — is there a * (synced) or + (candidate) next to the server? (3) Check if ACL is blocking UDP 123. (4) Check NTP authentication keys if configured."},
{cat:"Scenario: IP Services",q:"Syslog messages show interface flapping every few seconds. Which syslog severity level would these messages be?",opts:["Level 7 — Debug","Level 6 — Informational","Level 3 — Error","Level 5 — Notice"],ans:2,exp:"Interface state changes (up/down) generate Level 3 (Error) syslog messages: '%LINEPROTO-3-UPDOWN' or '%LINK-3-UPDOWN'. Significant events indicating something is wrong. Level 3 = Error — conditions that need attention but aren't system-critical."},
{cat:"Scenario: IP Services",hot:1,q:"A VoIP call sounds choppy with intermittent audio drops. QoS is configured but voice uses 'Silver' profile in WLC. What should be changed?",opts:["Change to Bronze — lower priority","Change to Platinum — highest QoS priority for voice","Disable QoS — it's causing the issue","Change to Gold — video profile works for voice"],ans:1,exp:"Platinum = highest priority QoS profile in Cisco WLC — designed specifically for VoIP. Silver = best effort (default) — voice traffic competes with regular data. Voice requires strict priority queuing (LLQ) with guaranteed low latency/jitter. Always assign Platinum to voice WLANs."},
{cat:"Scenario: IP Services",q:"After changing the NAT pool, users still get translated to old IP addresses. What should you do?",opts:["Reload the router","Run 'clear ip nat translation *' to flush old NAT entries","Disable NAT and re-enable","Change the ACL"],ans:1,exp:"NAT translation table entries are cached. Changing the pool config doesn't immediately clear existing sessions. 'clear ip nat translation *' flushes all dynamic entries. New connections then get translated using the new pool. Note: active sessions are dropped when cleared."},
{cat:"Scenario: IP Services",q:"An administrator wants only severity 0-3 messages forwarded to the syslog server. Which command achieves this?",opts:["logging trap 3","logging trap errors","logging trap critical","Both A and B are correct"],ans:3,exp:"Both work: 'logging trap 3' and 'logging trap errors' both set the threshold to level 3 (Error). Levels 0 (Emergency), 1 (Alert), 2 (Critical), and 3 (Error) are forwarded. Levels 4-7 are not sent. You can use the number OR the keyword name."},
{cat:"Scenario: IP Services",hot:1,q:"A network admin configures SNMP v3 with authPriv. What does this provide?",opts:["Authentication only — no encryption","Encryption only — no authentication","Both authentication (MD5/SHA) AND encryption (AES/DES) — most secure SNMP","No security — same as v1"],ans:2,exp:"SNMPv3 authPriv = Auth + Privacy (encryption). Auth uses MD5 or SHA to verify the message came from a legitimate source. Priv uses AES or DES to encrypt the message contents. This is the ONLY SNMP version with real security. Always use authPriv in production."},
// ── ADVANCED ───────────────────────────────────────────────────────────────
{cat:"NAT",q:"A static NAT entry maps 192.168.1.10 to 203.0.113.10. An external host sends a packet to 203.0.113.10. What does the router do?",opts:["Drops it — inbound traffic not allowed","Translates destination 203.0.113.10 → 192.168.1.10 and forwards inside","Sends an ARP for 192.168.1.10","Returns an ICMP redirect"],ans:1,exp:"Static NAT is bidirectional. Outbound: src 192.168.1.10 → translated to 203.0.113.10. Inbound: dst 203.0.113.10 → translated BACK to 192.168.1.10 and forwarded to the internal server. This allows external hosts to reach internal servers — that's the purpose of static NAT for servers."},
{cat:"DHCP",q:"What is DHCP Option 43 used for?",opts:["Specifies the default gateway","Provides vendor-specific information (e.g., WLC IP address for AP provisioning)","Sets the lease duration","Specifies the NTP server"],ans:1,exp:"DHCP Option 43 = Vendor Specific Information. Used to provide device-specific configuration. Cisco APs use Option 43 to receive the WLC IP address during DHCP — enabling zero-touch AP provisioning. The AP gets its IP via DHCP and simultaneously learns the WLC address from Option 43."},
{cat:"QoS",q:"Which QoS component marks traffic as close to the source as possible?",opts:["Policing","Shaping","Classification and Marking at the access layer","Queuing at the core"],ans:2,exp:"QoS best practice: classify and mark traffic at the ACCESS LAYER (where it enters the network). Mark once, trust everywhere. Core and distribution layers simply honor the existing DSCP markings. Marking at the edge ensures consistent treatment throughout the network path."},
{cat:"NTP",q:"What is the maximum number of NTP stratum levels?",opts:["8","15","16","255"],ans:2,exp:"NTP stratum 0-15 are valid (0=reference clock, 15=maximum valid). Stratum 16 means UNSYNCHRONIZED — the device has no valid time source. A device syncing from a stratum 15 source would become stratum 16 (synchronized to nothing). Avoid chains longer than 15 hops."},
{cat:"SNMP",q:"What is an SNMP OID?",opts:["The SNMP community string","Object Identifier — a unique numerical sequence identifying a specific MIB variable","The NMS IP address","The SNMP version number"],ans:1,exp:"OID (Object Identifier) = a dotted numerical sequence uniquely identifying a MIB object. Example: 1.3.6.1.2.1.1.3.0 = sysUpTime (how long device has been running). NMS queries specific OIDs to retrieve values. Every manageable attribute has a unique OID in the global MIB tree."},
{cat:"FTP & TFTP",q:"Which command configures FTP credentials on a Cisco router for IOS uploads?",opts:["ftp username admin password Cisco","ip ftp username cisco / ip ftp password Cisco123","ftp-server username cisco","service ftp username cisco password Cisco123"],ans:1,exp:"'ip ftp username [name]' and 'ip ftp password [pass]' configure the FTP credentials used when the router acts as an FTP CLIENT (uploading/downloading files from an FTP server). Used before 'copy ftp flash' to authenticate with the server."},
{cat:"SSH & Remote Access",q:"What does 'ip ssh authentication-retries 3' configure?",opts:["Maximum concurrent SSH sessions","Number of password attempts before SSH session is disconnected","SSH key rotation interval","SSH session timeout"],ans:1,exp:"'ip ssh authentication-retries 3' allows 3 failed password attempts before the SSH session is terminated. Limits brute-force login attempts via SSH. Default is 3. Combine with 'login block-for' for comprehensive brute-force protection."},
];

let uA={},sub={},cf='all';
function rl(){
  const s=document.getElementById('search').value.toLowerCase();
  const c=document.getElementById('qlist');
  let h='',prev='';
  qs.forEach((q,i)=>{
    if(cf==='correct'&&!(sub[i]&&uA[i]===q.ans))return;
    if(cf==='wrong'&&!(sub[i]&&uA[i]!==q.ans))return;
    if(cf==='unattempted'&&sub[i])return;
    if(s&&!q.q.toLowerCase().includes(s)&&!q.cat.toLowerCase().includes(s)&&!q.exp.toLowerCase().includes(s))return;
    if(q.cat!==prev){h+=`<div class="cat-header">📌 ${q.cat}</div>`;prev=q.cat;}
    const iS=sub[i],iC=iS&&uA[i]===q.ans,iW=iS&&uA[i]!==q.ans;
    let cc='q-card';if(iC)cc+=' answered-correct';if(iW)cc+=' answered-wrong';
    let badge='';
    if(iC)badge='<span class="result-badge rb-correct">✓ Correct</span>';
    else if(iW)badge='<span class="result-badge rb-wrong">✗ Wrong</span>';
    else if(uA[i]!==undefined)badge='<span class="result-badge" style="background:#e0f2fe;color:#0369a1">Selected</span>';
    h+=`<div class="${cc}" id="qc${i}">
      <div class="q-header">
        <span class="q-num">Q${i+1}${q.hot?'<span class="tag-hot">🔥</span>':''}</span>
        <span style="flex:1"></span>${badge}
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    ['A','B','C','D'].forEach((L,oi)=>{
      let cls='opt';
      if(uA[i]===oi&&!iS)cls+=' selected';
      if(iS&&oi===q.ans)cls+=' correct-ans';
      if(iS&&uA[i]===oi&&oi!==q.ans)cls+=' wrong-ans';
      const d=iS?'style="cursor:default"':`onclick="sel(${i},${oi})"`;
      h+=`<div class="${cls}" ${d}><span class="opt-letter">${L}</span>${q.opts[oi]}</div>`;
    });
    h+=`</div><div class="btn-row">
      ${!iS?`<button class="btn btn-submit" onclick="sbQ(${i})">Submit</button>`:''}
      <button class="btn btn-show" onclick="tgE(${i})">Explanation</button>
      ${iS?`<button class="btn btn-reset-q" onclick="rsQ(${i})">Reset</button>`:''}
    </div>
    <div class="explanation" id="ex${i}"><strong>✅ </strong>${q.exp}</div></div>`;
  });
  if(!h)h='<div style="padding:20px;text-align:center;color:#888">No matching questions.</div>';
  c.innerHTML=h;upS();
}
function sel(i,o){if(sub[i])return;uA[i]=o;rl();}
function sbQ(i){if(uA[i]===undefined){alert('Select an answer!');return;}sub[i]=true;rl();}
function tgE(i){const e=document.getElementById('ex'+i);if(e)e.classList.toggle('show');}
function rsQ(i){delete uA[i];delete sub[i];rl();}
function saAll(){qs.forEach((_,i)=>{if(uA[i]!==undefined)sub[i]=true;});rl();}
function raAll(){document.querySelectorAll('.explanation').forEach(e=>e.classList.add('show'));}
function resetAll(){if(!confirm('Reset all?'))return;uA={};sub={};rl();}
function showScore(){
  const tot=qs.length,att=Object.keys(sub).length;
  const cor=qs.filter((q,i)=>sub[i]&&uA[i]===q.ans).length;
  const pct=att>0?Math.round(cor/tot*100):0;
  const g=pct>=90?'🏆 Excellent!':pct>=75?'👍 Good Work!':pct>=60?'📚 Keep Reviewing':'🔄 More Study Needed';
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=cm;
  const md=document.createElement('div');md.className='score-modal';
  md.innerHTML=`<h2>IP Services Score</h2><div class="big">${pct}%</div>
    <p style="margin:8px 0;font-size:14px">${cor}/${tot} correct</p>
    <p style="color:#dc2626">Wrong: ${att-cor}</p>
    <p style="color:#6b7280;margin-bottom:12px">Unattempted: ${tot-att}</p>
    <p style="font-size:16px;font-weight:700;color:#5B3FD4">${g}</p>
    <button class="gbtn gbtn-primary" style="margin-top:14px" onclick="cm()">Close</button>`;
  document.body.appendChild(ov);document.body.appendChild(md);window._m=md;window._o=ov;
}
function cm(){if(window._m)window._m.remove();if(window._o)window._o.remove();}
function upS(){
  const tot=qs.length,att=Object.keys(sub).length;

// Fisher-Yates shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Shuffle options and fix answer index
function shuffleQuestions() {
  qs.forEach(q => {
    const correctAnswer = q.opts[q.ans];

    const paired = q.opts.map((opt, idx) => ({
      text: opt,
      wasCorrect: idx === q.ans
    }));

    shuffle(paired);

    q.opts = paired.map(x => x.text);
    q.ans = paired.findIndex(x => x.wasCorrect);
  });

  shuffle(qs);
}

// Run once when page loads
shuffleQuestions();
