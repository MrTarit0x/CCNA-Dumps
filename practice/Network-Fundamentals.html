<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA Network Fundamentals Practice Quiz</title>
  <link rel="stylesheet" href="./css/Network-Fundamentals.css">
</head>

<body>
  <div class="complete-banner">🏆 Domain 1: 🎯 CCNA Network Fundamentals — 100 Exam MCQ</div>
  <div class="stats-bar">
    <div class="stat">
      <div class="v" id="s-total">100</div>
      <div class="l">Total</div>
    </div>
    <div class="stat correct">
      <div class="v" id="s-correct">0</div>
      <div class="l">Correct</div>
    </div>
    <div class="stat wrong">
      <div class="v" id="s-wrong">0</div>
      <div class="l">Wrong</div>
    </div>
    <div class="stat skip">
      <div class="v" id="s-unattempted">100</div>
      <div class="l">Remaining</div>
    </div>
    <div class="stat">
      <div class="v" id="s-pct">0%</div>
      <div class="l">Score</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>
  <div class="filter-bar">
    <input type="text" id="search" placeholder="🔍 Search questions..." oninput="applyFilters()">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('unattempted',this)">Remaining</button>
    <button class="filter-btn" onclick="setFilter('correct',this)">✓ Correct</button>
    <button class="filter-btn" onclick="setFilter('wrong',this)">✗ Wrong</button>
  </div>
  <div class="global-btns">
    <button class="gbtn gbtn-primary" onclick="submitAll()">Submit All</button>
    <button class="gbtn gbtn-green" onclick="revealAllExplanations()">All Explanations</button>
    <button class="gbtn gbtn-gray" onclick="resetAll()">Retake</button>
    <button class="gbtn gbtn-red" onclick="showScore()">Show Score</button>
  </div>
  <div id="qlist"></div>

  <script src="./q-bank/network-fundamentals.js"></script>
  <script>
const qs = [...bank];

    let userAnswers = {}; // {qIndex: selectedOption}
    let submitted = {}; // {qIndex: true}
    let currentFilter = 'all';



    // Add above renderList()-------------------------------------------
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // ------------------------------------------------------------------

    function renderList() {
      const search = document.getElementById('search').value.toLowerCase();
      const container = document.getElementById('qlist');
      let html = '';
      qs.forEach((q, i) => {
        if (currentFilter === 'correct' && !(submitted[i] && userAnswers[i] === q.ans)) return;
        if (currentFilter === 'wrong' && !(submitted[i] && userAnswers[i] !== q.ans)) return;
        if (currentFilter === 'unattempted' && submitted[i]) return;
        if (search && !q.q.toLowerCase().includes(search) && !q.cat.toLowerCase().includes(search) && !q.exp.toLowerCase().includes(search)) return;

        const isSubmitted = submitted[i];
        const isCorrect = isSubmitted && userAnswers[i] === q.ans;
        const isWrong = isSubmitted && userAnswers[i] !== q.ans;
        let cardClass = 'q-card';
        if (isCorrect) cardClass += ' answered-correct';
        if (isWrong) cardClass += ' answered-wrong';

        let badge = '';
        if (isCorrect) badge = '<span class="result-badge rb-correct">✓ Correct</span>';
        else if (isWrong) badge = '<span class="result-badge rb-wrong">✗ Wrong</span>';
        else if (userAnswers[i] !== undefined) badge = '<span class="result-badge rb-skip">Selected</span>';

        html += `<div class="${cardClass}" id="qcard-${i}">
      <div class="q-header">
        <span class="q-num">Q${i + 1}${q.hot ? '<span class="tag-hot">🔥</span>' : ''}</span>
        <span style="flex:1"></span>
        ${badge}
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
        const letters = ['A', 'B', 'C', 'D'];
        q.opts.forEach((opt, oi) => {
          let cls = 'opt';
          if (userAnswers[i] === oi && !isSubmitted) cls += ' selected';
          if (isSubmitted && oi === q.ans) cls += ' correct-ans';
          if (isSubmitted && userAnswers[i] === oi && oi !== q.ans) cls += ' wrong-ans';
          const disabled = isSubmitted ? 'style="cursor:default"' : `onclick="selectOpt(${i},${oi})"`;
          html += `<div class="${cls}" ${disabled}><span class="opt-letter">${letters[oi]}</span>${opt}</div>`;
        });
        html += `</div>
      <div class="btn-row">
        ${!isSubmitted ? `<button class="btn btn-submit" onclick="submitQ(${i})">Submit Answer</button>` : ''}
        <button class="btn btn-show" onclick="toggleExp(${i})">${isSubmitted ? 'Show/Hide Explanation' : 'Show Answer'}</button>
        ${isSubmitted ? `<button class="btn btn-reset-q" onclick="resetQ(${i})">Reset</button>` : ''}
      </div>
      <div class="explanation" id="exp-${i}"><strong>✅ Explanation:</strong> ${q.exp}</div>
    </div>`;
      });
      if (!html) html = '<div style="padding:20px;text-align:center;color:#888">No questions match your filter.</div>';
      container.innerHTML = html;
      updateStats();
    }
    // -------------------------------------------------------------------
shuffleArray(qs);

qs.forEach(q => {

  // Create option objects
  let options = q.opts.map((text, index) => ({
    text,
    correct: index === q.ans
  }));

  // Shuffle options
  for (let i = options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [options[i], options[j]] = [options[j], options[i]];
  }

  // Rebuild options array
  q.opts = options.map(o => o.text);

  // Find new correct answer index
  q.ans = options.findIndex(o => o.correct);
  console.log(
  "Question:",
  q.q,
  "Correct:",
  q.opts[q.ans],
  "Index:",
  q.ans
);
});

renderList();
    // -------------------------------------------------------------------

    function selectOpt(qi, oi) {
      if (submitted[qi]) return;
      userAnswers[qi] = oi;
      renderList();
    }

    function submitQ(qi) {
      if (userAnswers[qi] === undefined) { alert('Please select an answer first!'); return; }
      submitted[qi] = true;
      renderList();
    }

    function toggleExp(qi) {
      const el = document.getElementById('exp-' + qi);
      if (el) el.classList.toggle('show');
    }

    function resetQ(qi) {
      delete userAnswers[qi];
      delete submitted[qi];
      renderList();
    }

    function submitAll() {
      qs.forEach((q, i) => { if (userAnswers[i] !== undefined) submitted[i] = true; });
      renderList();
    }

    function revealAllExplanations() {
      document.querySelectorAll('.explanation').forEach(e => e.classList.add('show'));
    }

    function resetAll() {
      if (!confirm('Reset all answers?')) return;
      userAnswers = {}; submitted = {};
      renderList();
    }

    function showScore() {
      const total = qs.length;
      const attempted = Object.keys(submitted).length;
      const correct = qs.filter((q, i) => submitted[i] && userAnswers[i] === q.ans).length;
      const wrong = attempted - correct;
      const pct = attempted > 0 ? Math.round(correct / total * 100) : 0;
      let grade = pct >= 90 ? '🏆 Excellent! Exam Ready!' : pct >= 75 ? '👍 Good! Keep Practicing' : pct >= 60 ? '📚 Needs More Review' : '🔄 Study More Before Exam';
      const overlay = document.createElement('div'); overlay.className = 'overlay'; overlay.onclick = closeModal;
      const modal = document.createElement('div'); modal.className = 'score-modal';
      modal.innerHTML = `<h2>Your Score</h2><div class="big">${pct}%</div>
    <p style="margin:10px 0;font-size:14px">${correct} / ${total} correct</p>
    <p style="color:#dc2626;margin-bottom:6px">Wrong: ${wrong}</p>
    <p style="color:#6b7280;margin-bottom:14px">Unattempted: ${total - attempted}</p>
    <p style="font-size:18px;font-weight:700;color:#5B3FD4">${grade}</p>
    <button class="gbtn gbtn-primary" style="margin-top:16px" onclick="closeModal()">Close</button>`;
      document.body.appendChild(overlay); document.body.appendChild(modal);
      window._modal = modal; window._overlay = overlay;
    }

    function closeModal() {
      if (window._modal) window._modal.remove();
      if (window._overlay) window._overlay.remove();
    }

    function updateStats() {
      const total = qs.length;
      const attempted = Object.keys(submitted).length;
      const correct = qs.filter((q, i) => submitted[i] && userAnswers[i] === q.ans).length;
      const wrong = attempted - correct;
      document.getElementById('s-total').textContent = total;
      document.getElementById('s-correct').textContent = correct;
      document.getElementById('s-wrong').textContent = wrong;
      document.getElementById('s-unattempted').textContent = total - attempted;
      const pct = attempted > 0 ? Math.round(correct / total * 100) : 0;
      document.getElementById('s-pct').textContent = pct + '%';
      document.getElementById('prog').style.width = Math.round(attempted / total * 100) + '%';
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function applyFilters() { renderList(); }

    renderList();
  </script>
  <iframe src="../navbar.html" 
        style="border:none;width:100%;height:70px;position:fixed;bottom:0;left:0;z-index:999;">
</iframe>
</body>

</html>
