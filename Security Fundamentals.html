<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:transparent;color:var(--fg,#1a1a1a);font-size:13px;padding:10px}
h1{font-size:15px;color:var(--accent,#5B3FD4);margin-bottom:4px;border-bottom:2px solid var(--accent,#5B3FD4);padding-bottom:6px}
.stats-bar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.stat{background:var(--surface2,#f0eeff);border-radius:8px;padding:6px 14px;text-align:center;flex:1;min-width:70px}
.stat .v{font-size:18px;font-weight:800;color:var(--accent,#5B3FD4)}
.stat .l{font-size:10px;color:#888}
.stat.correct .v{color:#16a34a}
.stat.wrong .v{color:#dc2626}
.stat.skip .v{color:#d97706}
.progress-wrap{background:#e5e7eb;border-radius:10px;height:10px;margin-bottom:10px}
.progress-fill{height:10px;border-radius:10px;background:linear-gradient(90deg,#5B3FD4,#dc2626);transition:width 0.3s}
.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:160px;padding:6px 10px;border-radius:6px;border:1.5px solid var(--accent,#5B3FD4);font-size:12px;background:var(--surface,#f8f8f8);color:var(--fg,#1a1a1a)}
.filter-btn{padding:5px 12px;border-radius:16px;border:1.5px solid #aaa;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:#555}
.filter-btn.active{background:var(--accent,#5B3FD4);color:#fff;border-color:var(--accent,#5B3FD4)}
.q-card{border:1.5px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s}
.q-card.answered-correct{border-color:#16a34a}
.q-card.answered-wrong{border-color:#dc2626}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 6px;gap:10px;flex-wrap:wrap}
.q-num{font-weight:800;color:var(--accent,#5B3FD4);font-size:12px;flex-shrink:0}
.q-category{font-size:10px;background:var(--accent,#5B3FD4);color:#fff;border-radius:10px;padding:2px 8px;flex-shrink:0}
.q-text{padding:0 14px 10px;font-weight:600;font-size:13px;line-height:1.5}
.options{padding:0 14px 10px;display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:8px;padding:7px 12px;border-radius:7px;border:1.5px solid #e5e7eb;cursor:pointer;transition:all 0.15s;line-height:1.4}
.opt:hover{border-color:var(--accent,#5B3FD4);background:var(--surface2,#f0eeff)}
.opt.selected{border-color:var(--accent,#5B3FD4);background:var(--surface2,#f0eeff)}
.opt.correct-ans{border-color:#16a34a;background:#f0fdf4;font-weight:700}
.opt.wrong-ans{border-color:#dc2626;background:#fef2f2}
.opt-letter{font-weight:800;color:var(--accent,#5B3FD4);flex-shrink:0;width:16px}
.opt.correct-ans .opt-letter{color:#16a34a}
.opt.wrong-ans .opt-letter{color:#dc2626}
.explanation{margin:0 14px 12px;padding:10px 12px;border-radius:7px;background:var(--surface2,#f0faf8);border-left:4px solid #1D9E75;font-size:12px;line-height:1.6;display:none}
.explanation.show{display:block}
.explanation strong{color:#1D9E75}
.btn-row{display:flex;gap:8px;padding:0 14px 12px;flex-wrap:wrap}
.btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn-submit{background:var(--accent,#5B3FD4);color:#fff}
.btn-show{background:#1D9E75;color:#fff}
.btn-reset-q{background:#e5e7eb;color:#555}
.result-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.rb-correct{background:#dcfce7;color:#16a34a}
.rb-wrong{background:#fee2e2;color:#dc2626}
.global-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.gbtn{padding:6px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700}
.gbtn-primary{background:var(--accent,#5B3FD4);color:#fff}
.gbtn-green{background:#16a34a;color:#fff}
.gbtn-red{background:#dc2626;color:#fff}
.gbtn-gray{background:#6b7280;color:#fff}
.tag-hot{background:#e05a2b;color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;margin-left:4px}
.cat-header{background:var(--surface2,#f0eeff);padding:6px 14px;font-weight:700;font-size:12px;color:var(--accent,#5B3FD4);border-bottom:1px solid #e5e7eb;letter-spacing:0.5px}
.score-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:28px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.3);z-index:100;text-align:center;min-width:280px;max-width:90vw}
.score-modal h2{font-size:22px;margin-bottom:8px;color:var(--accent,#5B3FD4)}
.score-modal .big{font-size:48px;font-weight:900;color:var(--accent,#5B3FD4)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:99}
</style>
</head>
<body>
<h1>🎯 CCNA Domain 5: Security Fundamentals — 100 Exam MCQs</h1>
<div class="stats-bar">
  <div class="stat"><div class="v" id="s-total">100</div><div class="l">Total</div></div>
  <div class="stat correct"><div class="v" id="s-correct">0</div><div class="l">Correct</div></div>
  <div class="stat wrong"><div class="v" id="s-wrong">0</div><div class="l">Wrong</div></div>
  <div class="stat skip"><div class="v" id="s-unattempted">100</div><div class="l">Remaining</div></div>

</div>

<div class="filter-bar">
  <input type="text" id="search" placeholder="🔍 Search by topic, keyword, or command..." oninput="af()">
  <button class="filter-btn active" onclick="sf('all',this)">All</button>
  <button class="filter-btn" onclick="sf('unattempted',this)">Remaining</button>

</div>

  <button class="gbtn gbtn-primary" onclick="saAll()">Submit All</button>
  <button class="gbtn gbtn-green" onclick="raAll()">Show All Explanations</button>
  <button class="gbtn gbtn-gray" onclick="resetAll()">Reset Quiz</button>
  <button class="gbtn gbtn-red" onclick="showScore()">📊 Score</button>
</div>
<div id="qlist"></div>
<script>
const qs=[
// ── SECURITY CONCEPTS ──────────────────────────────────────────────────────
{cat:"Security Concepts",hot:1,q:"Which term describes a weakness in a system that could be exploited by an attacker?",opts:["Threat","Exploit","Vulnerability","Risk"],ans:2,exp:"Vulnerability = a weakness or flaw in a system (unpatched software, open port, weak password). Threat = potential danger that could exploit it. Exploit = the actual tool/technique used to attack. Risk = probability × impact. Think: Vulnerability is the open window, Threat is the burglar, Exploit is the ladder."},
{cat:"Security Concepts",hot:1,q:"What type of attack floods a target system with traffic to make it unavailable to legitimate users?",opts:["Man-in-the-Middle (MitM)","Denial of Service (DoS)","Phishing","Replay attack"],ans:1,exp:"DoS (Denial of Service) = flooding a target with traffic/requests to exhaust resources and deny access to legitimate users. DDoS = Distributed DoS using many compromised hosts (botnet). Mitigation: rate limiting, ACLs, anti-DDoS services, ISP filtering."},
{cat:"Security Concepts",hot:1,q:"An attacker intercepts communication between two parties and reads/modifies the data without detection. What attack is this?",opts:["DoS","Phishing","Man-in-the-Middle (MitM)","Replay"],ans:2,exp:"Man-in-the-Middle (MitM): attacker positions themselves between two communicating parties, reads/modifies traffic in transit. Example: ARP poisoning to intercept LAN traffic. Mitigations: encryption (TLS/HTTPS), Dynamic ARP Inspection, PKI certificates."},
{cat:"Security Concepts",q:"Which attack captures a valid authentication packet and retransmits it later to gain unauthorized access?",opts:["Brute force","Replay attack","Social engineering","Buffer overflow"],ans:1,exp:"Replay attack: attacker captures a legitimate authentication packet and replays it later. System accepts the replayed credential. Mitigations: timestamps in packets, sequence numbers, session tokens that expire. IPsec and TLS both include replay protection."},
{cat:"Security Concepts",hot:1,q:"An employee receives an email appearing to be from IT support asking them to click a link and enter credentials. What attack is this?",opts:["Vishing","Smishing","Phishing","Social engineering only"],ans:2,exp:"Phishing = deceptive email tricking users into revealing credentials or clicking malicious links. Vishing = voice phishing (phone calls). Smishing = SMS phishing (text messages). All are forms of social engineering — exploiting human psychology rather than technical vulnerabilities."},
{cat:"Security Concepts",q:"What is the difference between a virus and a worm?",opts:["Viruses affect hardware; worms affect software","A virus requires user action to spread (attaches to files); a worm self-replicates across networks without user action","Viruses are more dangerous than worms","Worms only affect Windows; viruses affect all OS"],ans:1,exp:"Virus: attaches to files, requires user action (opening file, running program) to spread. Worm: self-replicates across network connections autonomously — no user action needed. Worms spread much faster (WannaCry, Code Red spread within hours). Both are malware."},
{cat:"Security Concepts",q:"What is a Trojan horse malware?",opts:["Malware that replicates itself across networks","Malware that appears to be legitimate software but contains malicious code","Malware that encrypts files for ransom","Malware that records keystrokes"],ans:1,exp:"Trojan = disguises itself as legitimate/useful software. User voluntarily installs it. Once running, it executes malicious payload (backdoor, keylogger, botnet agent). Unlike viruses/worms, Trojans don't self-replicate. Named after the Greek Trojan Horse story."},
{cat:"Security Concepts",hot:1,q:"What is ransomware?",opts:["Software that displays advertisements","Malware that encrypts victim's files and demands payment for decryption key","Software that monitors user activity","Malware that steals passwords silently"],ans:1,exp:"Ransomware encrypts victim's files making them inaccessible, then demands cryptocurrency ransom for the decryption key. Examples: WannaCry, NotPetya, REvil. Prevention: regular backups (offline/cloud), patching, email filtering, endpoint protection."},
{cat:"Security Concepts",q:"Which type of attack exploits a previously unknown vulnerability with no available patch?",opts:["Brute force attack","Zero-day exploit","Dictionary attack","Replay attack"],ans:1,exp:"Zero-day exploit: attacks a vulnerability that is unknown to the vendor (zero days to patch it). Extremely dangerous because no patch exists. Mitigations: defense-in-depth, IPS/behavior-based detection, network segmentation to limit blast radius."},
{cat:"Security Concepts",q:"Social engineering primarily exploits which vulnerability?",opts:["Unpatched software","Weak encryption","Human psychology and trust","Network misconfiguration"],ans:2,exp:"Social engineering manipulates PEOPLE rather than systems. Exploits trust, authority, urgency, fear. Examples: pretexting (creating false scenarios), baiting, tailgating (following someone through a secured door). Technical controls can't fully stop social engineering — user training is the main defense."},
// ── SECURITY PROGRAM ───────────────────────────────────────────────────────
{cat:"Security Program",q:"Which element of a security program specifically addresses users clicking malicious links in emails?",opts:["Physical access control","User awareness training","Patch management","Network segmentation"],ans:1,exp:"User awareness training teaches employees to recognize phishing, social engineering, suspicious links, and proper security hygiene. Since most breaches start with human error, awareness training is one of the most cost-effective security investments. Regular phishing simulations reinforce training."},
{cat:"Security Program",hot:1,q:"An attacker follows an authorized employee through a secured door without badging in. What physical attack is this?",opts:["Shoulder surfing","Tailgating (piggybacking)","Dumpster diving","Vishing"],ans:1,exp:"Tailgating/piggybacking: an unauthorized person follows an authorized person through a secured physical entry point without using their own credentials. Prevention: mantraps (two-door airlocks), security awareness, badge-required entry, security guards. Physical security is the foundation of all security."},
{cat:"Security Program",q:"Which security concept involves multiple layers of security so that if one layer fails, others still protect the asset?",opts:["Single sign-on","Defense in depth","Zero trust","Least privilege"],ans:1,exp:"Defense in depth = layered security approach. If firewall fails, IPS catches threats. If IPS fails, endpoint protection catches it. If endpoint fails, data encryption protects data. No single control is relied upon — multiple overlapping controls. Also called 'security in layers.'"},
{cat:"Security Program",q:"The principle of 'least privilege' means:",opts:["Users should have the most access possible for productivity","Users should have only the MINIMUM access required to perform their job","Administrators should never log in","All users should have equal access"],ans:1,exp:"Least privilege: grant only the permissions necessary to perform the job function — nothing more. Limits blast radius if an account is compromised. Example: a marketing employee shouldn't have access to financial systems. Applies to users, processes, and services."},
// ── DEVICE ACCESS CONTROL ──────────────────────────────────────────────────
{cat:"Device Access Control",hot:1,q:"Which Cisco password type uses MD5 hashing and should ALWAYS be used instead of the plain enable password?",opts:["Type 0 — enable password","Type 5 — enable secret","Type 7 — service password-encryption","Type 4 — SHA-256"],ans:1,exp:"'enable secret' uses Type 5 (MD5 hash) — much stronger than 'enable password' (Type 0 = plaintext). Type 7 (service password-encryption) is just XOR obfuscation — easily decoded. If both 'enable password' and 'enable secret' are configured, 'enable secret' ALWAYS takes precedence."},
{cat:"Device Access Control",hot:1,q:"What does 'service password-encryption' do to passwords in the configuration?",opts:["Encrypts all passwords with AES-256","Applies Type 7 (weak XOR obfuscation) to plaintext passwords — NOT real encryption","Converts all passwords to MD5 hashes","Removes all passwords from the config"],ans:1,exp:"'service password-encryption' applies Type 7 encoding (simple XOR cipher) to plaintext passwords. It prevents casual shoulder-surfing but is NOT real security — Type 7 can be reversed with free online tools in seconds. Always use 'enable secret' (Type 5 MD5) for the privileged EXEC password."},
{cat:"Device Access Control",q:"What is the purpose of 'login block-for 120 attempts 3 within 60'?",opts:["Sets session timeout to 120 seconds","Blocks ALL logins for 120 seconds after 3 failed attempts within 60 seconds — prevents brute force","Limits concurrent sessions to 3","Locks out a specific user after 3 failures"],ans:1,exp:"This command provides DoS/brute-force protection for device login. If 3 failed attempts occur within 60 seconds, ALL login methods (console, SSH, Telnet) are blocked for 120 seconds. During block period, only users from 'quiet-mode access-class' ACL can log in."},
{cat:"Device Access Control",q:"Which privilege level provides full access to all IOS commands?",opts:["Level 0","Level 1","Level 10","Level 15"],ans:3,exp:"IOS privilege levels 0-15: Level 1 = User EXEC (Router> prompt, limited read-only commands). Level 15 = Privileged EXEC (Router# prompt, full access). Levels 2-14 = custom. Configure with: 'username admin privilege 15 secret [password]'."},
{cat:"Device Access Control",hot:1,q:"What is the purpose of a login banner (banner motd)?",opts:["Welcome message for authorized users","Legal warning displayed BEFORE login — establishes that unauthorized access is prohibited","Shows the device hostname","Displays current IOS version"],ans:1,exp:"Banner MOTD (Message of the Day) displays BEFORE login. It should contain a legal warning: 'Authorized access only. Unauthorized access is monitored and prosecuted.' This establishes legal standing for prosecution. A 'Welcome' message is legally counterproductive — it could be interpreted as invitation."},
{cat:"Device Access Control",q:"'exec-timeout 5 0' configured on a VTY line means:",opts:["Sessions timeout after 5 hours","Idle sessions are disconnected after 5 minutes 0 seconds","5 concurrent sessions maximum","Sessions require re-authentication every 5 minutes"],ans:1,exp:"'exec-timeout [minutes] [seconds]' — '5 0' = 5 minutes, 0 seconds. Idle VTY or console sessions are automatically disconnected after 5 minutes of inactivity. '0 0' = never timeout (security risk). Best practice: 5-10 minutes for VTY, shorter for highly sensitive devices."},
// ── PASSWORD POLICY ────────────────────────────────────────────────────────
{cat:"Password Policy",hot:1,q:"Which authentication method requires TWO different factor TYPES?",opts:["Username + password (both are 'something you know')","Password + PIN","Password + fingerprint biometric","Two different passwords"],ans:2,exp:"MFA (Multi-Factor Authentication) requires 2+ DIFFERENT factor TYPES: Something you know (password, PIN), Something you have (token, smart card, phone), Something you are (biometric: fingerprint, face, retina). Password + fingerprint = MFA. Password + PIN = NOT MFA (both are 'know' factors)."},
{cat:"Password Policy",q:"What is a digital certificate used for in authentication?",opts:["Stores encrypted passwords","Cryptographically verifies identity using PKI (Public Key Infrastructure) — 'something you have'","Generates one-time passwords","Provides physical access control"],ans:1,exp:"Digital certificates = 'something you have' authentication factor. Issued by a Certificate Authority (CA), the certificate cryptographically proves identity. Used in 802.1X (EAP-TLS), HTTPS, VPNs, and SSH key authentication. Much stronger than passwords alone."},
{cat:"Password Policy",q:"Which password policy element prevents users from reusing their last 5 passwords?",opts:["Password complexity","Password expiration","Password history","Account lockout"],ans:2,exp:"Password history policy stores previous passwords and prevents reuse of recent ones. 'Cannot reuse last 5 passwords' stops users from cycling back to old passwords immediately after a forced change. Typical enterprise setting: 5-12 passwords remembered."},
{cat:"Password Policy",hot:1,q:"What is the minimum recommended password length for network device access according to security best practices?",opts:["4 characters","6 characters","8 characters (minimum); 12+ recommended","Any length if complexity requirements are met"],ans:2,exp:"Minimum 8 characters is the baseline (configured with 'security passwords min-length 8' on Cisco). Modern NIST guidelines recommend 12+ characters, with longer passphrases preferred over complex short passwords. Length is more important than complexity for brute-force resistance."},
// ── IPsec VPNs ─────────────────────────────────────────────────────────────
{cat:"IPsec VPNs",hot:1,q:"What is the difference between a site-to-site VPN and a remote access VPN?",opts:["Site-to-site uses SSL; remote access uses IPsec","Site-to-site connects two networks (router-to-router), transparent to users; remote access connects individual users using VPN client software","Site-to-site is more secure","Remote access VPNs don't use encryption"],ans:1,exp:"Site-to-site VPN: permanent tunnel between two routers/firewalls connecting entire networks. End users don't need VPN software — transparent. Used for branch-to-HQ. Remote access VPN: individual user installs VPN client (Cisco AnyConnect), authenticates, gets a corporate IP. Used for work-from-home."},
{cat:"IPsec VPNs",hot:1,q:"Which IPsec protocol provides both encryption AND authentication of the payload?",opts:["AH (Authentication Header)","ESP (Encapsulating Security Payload)","IKE (Internet Key Exchange)","GRE (Generic Routing Encapsulation)"],ans:1,exp:"ESP (protocol 50): encrypts AND authenticates the payload — provides confidentiality + integrity + anti-replay. AH (protocol 51): authenticates only — NO encryption, payload visible. ESP is almost always preferred. AH can't work through NAT because it authenticates the entire packet including IP header."},
{cat:"IPsec VPNs",q:"What is the purpose of IKE (Internet Key Exchange) in IPsec?",opts:["Encrypts the actual data payload","Negotiates security parameters and exchanges cryptographic keys between VPN peers","Provides NAT traversal","Authenticates users with usernames"],ans:1,exp:"IKE (IKEv1/IKEv2) negotiates IPsec Security Associations (SAs): which encryption algorithms to use, authentication methods, key exchange, and lifetime. It runs in two phases: Phase 1 = builds the IKE tunnel, Phase 2 = builds the IPsec tunnel for actual data. Uses UDP 500 (and UDP 4500 for NAT-T)."},
{cat:"IPsec VPNs",q:"What is IPsec Tunnel Mode used for?",opts:["Encrypts only the TCP/UDP payload","Encrypts the ENTIRE original IP packet and adds a new IP header — used for site-to-site VPNs","Only provides authentication, not encryption","Used between end hosts on the same subnet"],ans:1,exp:"IPsec Tunnel Mode: entire original packet (including original IP header) is encrypted. A NEW outer IP header is added with the VPN gateway addresses. Used for site-to-site VPNs between routers/firewalls. Transport Mode: only encrypts payload, preserves original IP header — used between end hosts."},
{cat:"IPsec VPNs",hot:1,q:"Which VPN technology uses TCP port 443 and works through most firewalls without special configuration?",opts:["IPsec IKEv1","IPsec IKEv2","SSL/TLS VPN (e.g., Cisco AnyConnect)","GRE tunnel"],ans:2,exp:"SSL/TLS VPN uses port 443 (HTTPS) — the same port as normal web traffic. Firewalls and NAT devices almost never block port 443. This makes SSL VPN extremely firewall-friendly. Cisco AnyConnect uses SSL/TLS. IPsec uses UDP 500/4500 which may be blocked by some firewalls."},
{cat:"IPsec VPNs",q:"What does 'split tunneling' mean in a remote access VPN configuration?",opts:["The VPN tunnel is split between two ISPs","Only corporate-bound traffic goes through the VPN tunnel; internet traffic goes directly — saves VPN bandwidth","The tunnel uses two encryption algorithms","Authentication is split between two RADIUS servers"],ans:1,exp:"Split tunneling: traffic destined for the corporate network goes through the encrypted VPN tunnel; internet traffic (YouTube, Netflix) goes directly via the user's local internet connection — bypassing the VPN. Saves bandwidth on the VPN concentrator. Security risk: internet traffic is unprotected by corporate controls."},
// ── ACCESS CONTROL LISTS ───────────────────────────────────────────────────
{cat:"ACLs",hot:1,q:"A standard ACL is configured but only contains one 'deny' statement with no explicit 'permit'. What happens to all other traffic?",opts:["All other traffic is permitted","All other traffic is denied by the implicit 'deny any' at the end of every ACL","Traffic is forwarded to the default route","The ACL is invalid without a permit statement"],ans:1,exp:"Every ACL — standard or extended — has an INVISIBLE 'deny any' as the very last entry. If no traffic matches any explicit permit, everything is denied. This is why ACLs with only deny statements block ALL traffic. Always add an explicit 'permit any' at the end if you want unmatched traffic to pass."},
{cat:"ACLs",hot:1,q:"Where should a standard ACL be placed for maximum effectiveness?",opts:["Close to the source of traffic","Close to the DESTINATION of traffic","On the core router","On the WAN interface only"],ans:1,exp:"Standard ACL = source IP only. Place CLOSE TO DESTINATION to avoid accidentally blocking legitimate traffic to other destinations. If placed near the source, a deny for source 192.168.1.0/24 would block ALL traffic from that network, not just traffic to the intended destination."},
{cat:"ACLs",hot:1,q:"Where should an extended ACL be placed for maximum effectiveness?",opts:["Close to the destination","Close to the SOURCE of traffic","On the distribution layer only","On all interfaces simultaneously"],ans:1,exp:"Extended ACL = source IP + destination IP + protocol + port. Place CLOSE TO SOURCE to stop unwanted traffic as early as possible — saves bandwidth by not forwarding traffic that will eventually be denied. The specific destination+port filtering means it won't affect other traffic."},
{cat:"ACLs",hot:1,q:"An ACL has these entries: 1) deny host 10.1.1.5, 2) permit 10.1.1.0 0.0.0.255, 3) deny any. Host 10.1.1.5 sends a packet. What happens?",opts:["Permitted — matches line 2","Denied — matches line 1 first (top-down processing)","Denied — matches line 3","Permitted — more specific match wins"],ans:1,exp:"ACLs are processed TOP-DOWN, FIRST MATCH WINS. Host 10.1.1.5 matches line 1 (deny host 10.1.1.5) immediately — processing STOPS. Lines 2 and 3 are never evaluated. This is why specific entries must be placed BEFORE general entries. 'deny host 10.1.1.5' before 'permit 10.1.1.0/24' correctly blocks just that one host."},
{cat:"ACLs",q:"Which wildcard mask matches EXACTLY one host IP address?",opts:["255.255.255.255","0.0.0.0","0.0.0.255","255.0.0.0"],ans:1,exp:"Wildcard 0.0.0.0 means ALL bits must match — only one exact IP address matches. Equivalent to the 'host' keyword: 'permit host 10.1.1.1' = 'permit 10.1.1.1 0.0.0.0'. Wildcard 255.255.255.255 = 'any' — match any IP. Remember: wildcard is the INVERSE of subnet mask."},
{cat:"ACLs",hot:1,q:"Which command applies an ACL named 'FILTER_WEB' to an interface in the INBOUND direction?",opts:["ip access-group FILTER_WEB in","ip access-list FILTER_WEB in","access-group FILTER_WEB inbound","ip filter FILTER_WEB in"],ans:0,exp:"'ip access-group [ACL-name or number] [in|out]' applies an ACL to an interface. 'in' = filter packets arriving on this interface. 'out' = filter packets leaving this interface. Maximum one ACL per direction per interface. 'ip access-group' is for interfaces — 'access-class' is for VTY lines."},
{cat:"ACLs",hot:1,q:"Which command applies an ACL to restrict SSH access to VTY lines?",opts:["ip access-group 50 in on line vty","access-class 50 in on line vty","ip filter 50 in","access-list 50 apply vty"],ans:1,exp:"'access-class [ACL] in' (under line vty config) restricts which source IPs can SSH/Telnet to the device. Only IPs permitted by ACL 50 can connect. 'ip access-group' is NOT used on VTY lines — use 'access-class'. This is a commonly tested difference."},
{cat:"ACLs",q:"What is the advantage of named ACLs over numbered ACLs?",opts:["Named ACLs support more entries","Named ACLs can be applied to multiple interfaces","Named ACLs allow deletion of individual entries by sequence number — numbered ACLs require deleting the entire ACL","Named ACLs are processed faster"],ans:2,exp:"Named ACL advantage: individual entries have sequence numbers and can be deleted or inserted independently. 'no 20' deletes entry 20. '15 permit...' inserts before entry 20. Numbered ACLs can only be modified by deleting the entire ACL and re-entering all lines — major operational advantage for named ACLs."},
{cat:"ACLs",q:"An extended ACL entry: 'deny tcp 192.168.1.0 0.0.0.255 any eq 23'. What does this block?",opts:["All TCP traffic from 192.168.1.0/24","Telnet (port 23) traffic FROM 192.168.1.0/24 TO any destination","SSH traffic to 192.168.1.0/24","All traffic to port 23 from anywhere"],ans:1,exp:"Breaking down the entry: deny = action, tcp = protocol, 192.168.1.0 0.0.0.255 = source network /24, any = any destination IP, eq 23 = destination port 23 (Telnet). Result: blocks Telnet FROM the 192.168.1.0/24 subnet TO anywhere. Does not affect other protocols or ports."},
{cat:"ACLs",q:"Which command shows ACL match statistics to verify if traffic is hitting specific ACL entries?",opts:["show ip interface","show access-lists","show ip route","show interfaces"],ans:1,exp:"'show access-lists' shows all ACLs with MATCH COUNTS per entry (e.g., '10 permit any (45 matches)'). Match counts are ESSENTIAL for verifying ACLs are working. Zero matches on a line you expect to be hit = problem. Use 'clear ip access-list counters' to reset counts before testing."},
{cat:"ACLs",hot:1,q:"IPv6 ACLs differ from IPv4 ACLs in which way?",opts:["IPv6 ACLs use numbered format only","IPv6 ACLs are always NAMED (no numbered IPv6 ACLs); applied with 'ipv6 traffic-filter' not 'ip access-group'","IPv6 ACLs don't have an implicit deny","IPv6 ACLs filter Layer 2 only"],ans:1,exp:"IPv6 ACL differences: (1) Always named — no numbered IPv6 ACLs. (2) Applied with 'ipv6 traffic-filter [name] [in|out]' not 'ip access-group'. (3) IPv6 ACLs have implicit 'deny ipv6 any any' AND also implicitly permit ICMP neighbor discovery (needed for IPv6 to function)."},
// ── LAYER 2 SECURITY ───────────────────────────────────────────────────────
{cat:"Layer 2 Security",hot:1,q:"What threat does DHCP Snooping protect against?",opts:["MAC flooding attacks","ARP poisoning attacks","Rogue DHCP servers assigning incorrect IPs/gateways to clients","STP topology manipulation"],ans:2,exp:"DHCP Snooping blocks ROGUE DHCP SERVERS. A rogue DHCP server could assign wrong IPs, gateways, or DNS servers — redirecting all client traffic through the attacker (MitM). Snooping marks switch ports as trusted (uplinks to real server) or untrusted (user ports). DHCP replies from untrusted ports are DROPPED."},
{cat:"Layer 2 Security",hot:1,q:"After enabling DHCP Snooping globally, clients can't get IP addresses. What is the MOST likely cause?",opts:["DHCP pool is empty","The uplink port to the DHCP server was not configured as trusted — all ports are untrusted by default","Wrong VLAN specified","DHCP relay not configured"],ans:1,exp:"After 'ip dhcp snooping', ALL ports become UNTRUSTED by default. DHCP server replies (OFFER, ACK) from untrusted ports are dropped. Fix: configure 'ip dhcp snooping trust' on the uplink port connecting to the real DHCP server. Forgetting this blocks all DHCP — most common mistake."},
{cat:"Layer 2 Security",hot:1,q:"What attack does Dynamic ARP Inspection (DAI) prevent?",opts:["MAC flooding","DHCP starvation","ARP poisoning / ARP spoofing (Man-in-the-Middle)","STP root bridge hijacking"],ans:2,exp:"DAI prevents ARP poisoning: attackers send gratuitous ARP replies claiming to be the default gateway, poisoning ARP caches and redirecting traffic (MitM). DAI validates ARP packets against the DHCP Snooping binding table — IP-to-MAC mapping must match. Invalid ARP packets are dropped."},
{cat:"Layer 2 Security",hot:1,q:"What must be configured BEFORE Dynamic ARP Inspection (DAI) can work?",opts:["Port security","EtherChannel","DHCP Snooping — DAI uses the DHCP Snooping binding table","Spanning Tree PortFast"],ans:2,exp:"DAI depends on DHCP Snooping. DAI validates ARP {IP → MAC} against the DHCP Snooping binding table. If DHCP Snooping isn't enabled, there's no binding table → DAI can't validate anything. For static IP devices (no DHCP entry), create ARP ACLs: 'arp access-list' + 'ip arp inspection filter'."},
{cat:"Layer 2 Security",hot:1,q:"Port security is configured with 'switchport port-security violation shutdown'. An unauthorized MAC connects. What happens?",opts:["The unauthorized MAC is blocked but the port stays up","The port immediately goes to err-disabled state and all traffic stops","A syslog message is generated but nothing else happens","The switch reboots"],ans:1,exp:"Violation mode 'shutdown' (default): port goes immediately to err-disabled state — completely disabled. Must be manually recovered: 'shutdown' then 'no shutdown' on the interface. Or configure 'errdisable recovery cause psecure-violation' for automatic recovery after a timer."},
{cat:"Layer 2 Security",hot:1,q:"What is the difference between port security violation modes 'restrict' and 'protect'?",opts:["Restrict uses TCP; protect uses UDP","Restrict drops frames AND generates a syslog/SNMP trap + increments violation counter; protect silently drops frames with NO logging or counter","They are identical","Restrict allows up to 10 violations; protect allows unlimited"],ans:1,exp:"Both drop frames from unauthorized MACs and keep the port UP. Key difference: Restrict = generates syslog message + increments violation counter (you can see violations happened). Protect = completely SILENT — drops frames with no log, no counter. Protect is the hardest to detect and troubleshoot."},
{cat:"Layer 2 Security",q:"Which command configures port security to automatically learn and save connected MAC addresses?",opts:["switchport port-security mac-address auto","switchport port-security mac-address sticky","switchport port-security learn dynamic","switchport port-security memorize"],ans:1,exp:"'switchport port-security mac-address sticky' automatically learns connected MAC addresses AND saves them to the running configuration as static secure MACs. If you save the config ('copy run start'), sticky MACs persist through reloads — the device stays 'locked' to learned MACs."},
{cat:"Layer 2 Security",q:"A switch port is in err-disabled state due to port security. What is the correct recovery procedure?",opts:["Reload the switch","Run 'no err-disable' on the interface","Enter 'shutdown' then 'no shutdown' on the interface (after fixing root cause)","Wait 5 minutes — it auto-recovers by default"],ans:2,exp:"Manually recover err-disabled: fix the ROOT CAUSE first (remove rogue device), then: interface config → 'shutdown' → 'no shutdown'. Auto-recovery: 'errdisable recovery cause psecure-violation' + 'errdisable recovery interval 300' (recovers after 300 seconds automatically). Without fixing root cause, it will err-disable again immediately."},
{cat:"Layer 2 Security",q:"What attack does port security primarily defend against?",opts:["ARP poisoning","DHCP starvation","MAC address table flooding (CAM overflow attack)","STP manipulation"],ans:2,exp:"MAC flooding attack: attacker sends frames with thousands of different fake source MACs, filling the CAM table. When full, the switch enters fail-open mode and floods ALL frames like a hub — attacker captures all traffic with a sniffer. Port security limits MACs per port — attacker can only add the allowed number."},
{cat:"Layer 2 Security",hot:1,q:"Which Layer 2 security feature prevents an attacker from sending double-tagged frames to hop between VLANs?",opts:["Port security","DHCP Snooping","Changing the native VLAN to an unused VLAN + disabling DTP","DAI"],ans:2,exp:"VLAN hopping via double-tagging: attacker sends frame with outer tag = native VLAN (stripped at first switch, untagged = native) + inner tag = target VLAN. Second switch sees inner tag and delivers to target VLAN. Mitigation: change native VLAN to unused VLAN (e.g., 999) + 'switchport nonegotiate' to disable DTP."},
// ── AAA ─────────────────────────────────────────────────────────────────────
{cat:"AAA",hot:1,q:"What does each 'A' in AAA stand for?",opts:["Authentication, Authorization, Accounting","Access, Authentication, Auditing","Authentication, Access, Accounting","Authorization, Authentication, Auditing"],ans:0,exp:"AAA: Authentication = WHO are you? (verify identity via credentials). Authorization = WHAT can you do? (what commands/resources are permitted after authentication). Accounting = WHAT DID you do? (logs all actions for audit trail). Memory: 'Who, What, What-did-they-do.'"},
{cat:"AAA",hot:1,q:"What are the key differences between TACACS+ and RADIUS?",opts:["TACACS+ uses UDP 49; RADIUS uses TCP 1812","TACACS+ uses TCP 49, full packet encryption, Cisco proprietary, separates AAA; RADIUS uses UDP 1812/1813, password-only encryption, open standard","TACACS+ is for wireless; RADIUS is for wired","They are functionally identical"],ans:1,exp:"TACACS+: TCP port 49, encrypts ENTIRE packet, Cisco proprietary, SEPARATES authentication/authorization/accounting (granular control), best for device admin (CLI access). RADIUS: UDP 1812(auth)/1813(acct), encrypts PASSWORD ONLY, open RFC standard, combines auth+authorization, best for network access (802.1X, VPN)."},
{cat:"AAA",q:"In AAA, what does 'authorization' control?",opts:["Whether a user can log in at all","What commands and resources a user is PERMITTED to access after authentication","How user actions are logged","Password complexity requirements"],ans:1,exp:"Authorization determines WHAT authenticated users can do. Example: user 'netops' can run all show commands + interface config. User 'helpdesk' can only run show commands. TACACS+ separates authorization from authentication, allowing very granular command-level authorization."},
{cat:"AAA",q:"Which command enables AAA on a Cisco device?",opts:["aaa enable","aaa new-model","aaa start","enable aaa"],ans:1,exp:"'aaa new-model' enables AAA and overrides the old line-based authentication ('login' and 'password' on lines). Once enabled, ALL authentication goes through AAA. IMPORTANT: configure local fallback ('aaa authentication login default group tacacs+ local') or you may be locked out if the AAA server is unreachable."},
{cat:"AAA",hot:1,q:"Why is 'local' added as a fallback in the AAA authentication command?",opts:["Local authentication is faster","If the AAA server (TACACS+/RADIUS) is unreachable, local username/password database is used — prevents lockout","Local accounts are more secure","It's required syntax — the command fails without it"],ans:1,exp:"'aaa authentication login default group tacacs+ local' — if TACACS+ server is down/unreachable, authentication falls back to the LOCAL database. Without fallback, a TACACS+ server failure = NOBODY can log in = complete lockout. Always configure local fallback as safety net."},
// ── WIRELESS SECURITY ──────────────────────────────────────────────────────
{cat:"Wireless Security",hot:1,q:"WPA2 uses which encryption standard?",opts:["RC4 with TKIP","DES","AES with CCMP","3DES with TKIP"],ans:2,exp:"WPA2 = AES (Advanced Encryption Standard) with CCMP (Counter Mode CBC-MAC Protocol). AES is a symmetric block cipher — current gold standard for encryption. WPA used TKIP (RC4-based) which is now considered weak and deprecated. Always select AES when configuring WPA2."},
{cat:"Wireless Security",hot:1,q:"What is the main security improvement of WPA3 over WPA2?",opts:["WPA3 uses AES-256 only","WPA3 uses SAE (Simultaneous Authentication of Equals) which provides forward secrecy and prevents offline dictionary attacks on the handshake","WPA3 requires certificate-based auth only","WPA3 eliminated the pre-shared key concept"],ans:1,exp:"WPA3 uses SAE (Dragonfly handshake) replacing WPA2's 4-way handshake. SAE: (1) Cannot be used for offline dictionary attacks — each attempt requires online interaction with the AP. (2) Forward secrecy — past sessions can't be decrypted even if password is later compromised. WPA2's KRACK vulnerability exploited the 4-way handshake."},
{cat:"Wireless Security",hot:1,q:"WPA2-Personal vs WPA2-Enterprise — what is the authentication difference?",opts:["Personal uses certificates; Enterprise uses PSK","Personal uses a SHARED passphrase (PSK) for all users; Enterprise uses 802.1X with RADIUS and individual user credentials","Personal is for large networks; Enterprise is for home users","Personal uses WPA3; Enterprise uses WPA2"],ans:1,exp:"WPA2-Personal: single passphrase shared by all users — simpler but less secure (one compromised user = change password for everyone). WPA2-Enterprise: 802.1X + RADIUS — each user authenticates with unique credentials (username/password or certificate). More secure, granular access control, easy individual revocation."},
{cat:"Wireless Security",q:"What is WEP and why is it no longer recommended?",opts:["WEP is the latest wireless security standard","WEP (Wired Equivalent Privacy) uses RC4 cipher with static keys — fundamentally broken, cracked in minutes with freely available tools","WEP is only for enterprise networks","WEP requires a RADIUS server"],ans:1,exp:"WEP = Wired Equivalent Privacy (IEEE 802.11, 1997). Uses RC4 stream cipher with 40 or 104-bit static keys. Critically flawed: weak initialization vectors (IV) that repeat, allowing statistical attacks. Tools like Aircrack-ng crack WEP in under 2 minutes. NEVER use WEP — it provides essentially zero security."},
{cat:"Wireless Security",q:"In WPA2-Enterprise, what is the role of the Authenticator?",opts:["Validates user credentials directly","The ACCESS POINT — passes EAP authentication messages between client and RADIUS server without examining them","The RADIUS server","The DHCP server"],ans:1,exp:"802.1X roles: Supplicant = client (laptop). Authenticator = AP (passes EAP messages between supplicant and authentication server, enforces access). Authentication Server = RADIUS server (validates credentials, says allow/deny). The AP doesn't examine credentials — it's a transparent pass-through."},
{cat:"Wireless Security",q:"Which wireless security protocol is considered completely broken and should NEVER be used?",opts:["WPA3","WPA2 with AES","WEP","WPA2-Enterprise"],ans:2,exp:"WEP is completely broken. Static RC4 keys + weak IVs = crackable in minutes. WPA with TKIP is also deprecated (TKIP vulnerabilities). WPA2 with AES is still acceptable. WPA3 with SAE is current best standard. Never configure WEP on any device — it provides false sense of security."},
// ── SCENARIO TROUBLESHOOTING ───────────────────────────────────────────────
{cat:"Scenario: Security",hot:1,q:"A switch port shows err-disabled in 'show interfaces'. 'show errdisable reason' shows 'bpduguard'. What happened?",opts:["The interface was manually disabled","A switch was connected to a PortFast port — BPDU Guard detected a BPDU and err-disabled the port","Port security was triggered","DHCP Snooping disabled the port"],ans:1,exp:"BPDU Guard err-disables a PortFast port when ANY BPDU is received. This means someone connected a switch (or another STP-capable device) to a port configured for end devices. Fix: remove the unauthorized switch, then recover: 'shutdown' + 'no shutdown'. Investigate WHY a switch was connected there."},
{cat:"Scenario: Security",hot:1,q:"Hosts are getting IP addresses from a wrong DHCP server assigning 172.16.0.x addresses instead of the correct 192.168.1.x. What is the likely cause and fix?",opts:["DHCP pool misconfigured — change pool range","A rogue DHCP server exists on the network — enable DHCP Snooping and configure trusted ports","The default router is wrong","NTP is not configured"],ans:1,exp:"Rogue DHCP server: an unauthorized device (someone's phone hotspot, misconfigured server) is responding to DHCP requests before the legitimate server. Fix: enable DHCP Snooping ('ip dhcp snooping' + 'ip dhcp snooping vlan X') and mark only the uplink to the real server as trusted. Rogue DHCP responses from untrusted ports are dropped."},
{cat:"Scenario: Security",q:"An attacker successfully ARP-poisons the network and intercepts traffic. DHCP Snooping is already configured. What additional feature should have prevented this?",opts:["Port security","Spanning Tree PortFast","Dynamic ARP Inspection (DAI)","Root Guard"],ans:2,exp:"DHCP Snooping prevents rogue DHCP servers but does NOT prevent ARP poisoning. Dynamic ARP Inspection (DAI) validates ARP packets against the DHCP Snooping binding table and drops invalid ARP mappings. DAI prevents ARP poisoning/spoofing. Both features together provide comprehensive Layer 2 protection."},
{cat:"Scenario: Security",hot:1,q:"Traffic from 192.168.10.0/24 is being blocked by an ACL even though there's a 'permit ip any any' statement. What is MOST likely wrong?",opts:["'permit ip any any' is the wrong syntax","There is a 'deny' statement BEFORE the 'permit ip any any' that is matching the traffic — ACLs process top-down, first match wins","The ACL is not applied to the interface","The subnet mask is wrong"],ans:1,exp:"ACL top-down processing: a 'deny' entry BEFORE the 'permit ip any any' is matching the traffic first. ACL processing STOPS at the first match — the 'permit any any' at the bottom is NEVER reached. Check 'show access-lists' to see which lines have match counts. Reorder entries to permit before deny if needed."},
{cat:"Scenario: Security",q:"After configuring 'ip arp inspection vlan 10', a printer with a static IP loses connectivity. Why?",opts:["The printer's port is a trunk port","Printers use UDP which DAI blocks","The printer has a static IP — no DHCP Snooping binding exists for it, so all its ARP packets fail DAI validation","DAI conflicts with DHCP"],ans:2,exp:"DAI validates ARP against DHCP Snooping binding table. Devices with STATIC IPs never go through DHCP → no binding table entry → all their ARP packets are dropped by DAI. Fix: create an ARP ACL: 'arp access-list STATIC_DEVICES' + 'permit ip host [printer-IP] mac host [printer-MAC]' + 'ip arp inspection filter STATIC_DEVICES vlan 10'."},
{cat:"Scenario: Security",hot:1,q:"A security audit finds 'enable password Cisco123' in the config. What is the security concern and fix?",opts:["The password is too short — use longer password","'enable password' stores in Type 0 (plaintext) in the config — replace with 'enable secret Cisco123' which uses MD5 hash","The password doesn't meet complexity requirements","No issue — this is the recommended command"],ans:1,exp:"'enable password' = Type 0 = stored as plaintext in running-config and startup-config. Anyone who sees the config file sees the password. Fix: use 'enable secret [password]' = Type 5 (MD5 hash) — the hash can't be easily reversed. Also run 'service password-encryption' to obfuscate other plaintext passwords with Type 7."},
{cat:"Scenario: Security",q:"Which show command reveals which ACL is applied to a specific interface and in which direction?",opts:["show access-lists","show ip access-lists","show ip interface [interface]","show running-config"],ans:2,exp:"'show ip interface [interface]' shows: 'Inbound access list is [ACL-name/number]' and 'Outgoing access list is [ACL-name/number]' or 'not set'. This is the FASTEST way to confirm which ACL is applied where. 'show access-lists' shows the ACL content and match counts but not which interfaces it's applied to."},
// ── ADVANCED ───────────────────────────────────────────────────────────────
{cat:"ACLs",q:"Which ACL entry would permit ONLY ESTABLISHED TCP sessions (return traffic) from the internet?",opts:["permit tcp any any","permit tcp any any established","permit ip any any eq 80","permit tcp any any eq 80"],ans:1,exp:"'permit tcp any any established' — the 'established' keyword matches TCP packets with the ACK or RST bit set. These are RETURN packets from established sessions (responses to connections initiated from inside). This prevents unsolicited inbound TCP connections while allowing replies to outbound sessions."},
{cat:"Layer 2 Security",q:"Which command rate-limits DHCP packets on untrusted ports to prevent DHCP starvation attacks?",opts:["ip dhcp snooping trust rate 15","ip dhcp snooping limit rate 15","dhcp rate-limit 15","ip dhcp max-rate 15"],ans:1,exp:"'ip dhcp snooping limit rate 15' (under interface config) limits DHCP packets to 15 per second on untrusted ports. DHCP starvation: attacker sends thousands of DHCP Discover with spoofed MACs to exhaust the DHCP pool. Rate limiting stops the flood. If rate exceeded, port may be err-disabled."},
{cat:"IPsec VPNs",q:"What is the purpose of Perfect Forward Secrecy (PFS) in VPNs?",opts:["Encrypts both directions of traffic","Each session uses unique keys — compromise of one session's key does NOT compromise past or future sessions","Provides mutual authentication","Doubles the encryption strength"],ans:1,exp:"PFS: each VPN session generates completely new, independent encryption keys. If an attacker captures traffic and later obtains ONE session's keys (through compromise or math), they CANNOT decrypt other sessions. Without PFS, compromising the long-term key could decrypt all past sessions. WPA3/SAE also provides forward secrecy."},
{cat:"Wireless Security",q:"What is 802.1X and where is it used?",opts:["A wireless channel bonding standard","A port-based access control standard — requires authentication before network access is granted. Used in WPA2-Enterprise and wired network access control","A PoE standard","A wireless frequency band standard"],ans:1,exp:"IEEE 802.1X = port-based NAC (Network Access Control). Before the port is allowed network access, the user/device must authenticate (via EAP) to a RADIUS server. Used in: WPA2/WPA3-Enterprise (wireless), wired network access control (NAC), VPN authentication. Provides identity-based access control."},
{cat:"Security Concepts",q:"What is the purpose of a network IPS (Intrusion Prevention System) compared to an IDS?",opts:["IPS only detects threats; IDS prevents them","IPS sits inline and actively BLOCKS malicious traffic; IDS monitors passively and only alerts","IPS is hardware; IDS is software","They are identical in function"],ans:1,exp:"IDS (Intrusion Detection System) = passive, out-of-band — monitors traffic, generates alerts, does NOT block. IPS (Intrusion Prevention System) = active, inline — detects AND blocks malicious traffic in real time. IPS has higher risk (could block legitimate traffic) but actually stops attacks. Memory: IDS 'Detect and Scream', IPS 'Prevent and Stop.'"},
{cat:"AAA",q:"What is RADIUS primarily used for in enterprise networks?",opts:["Device administration (CLI access control)","Network access authentication — 802.1X wireless, VPN, and remote access","Only for accounting","SNMP community string management"],ans:1,exp:"RADIUS primary use: network access (802.1X wireless authentication, VPN user authentication, dial-up). RADIUS combines authentication + authorization in one response. TACACS+ is preferred for DEVICE ADMINISTRATION (CLI command authorization). Both can do accounting."},
{cat:"Device Access Control",q:"Which command sets the minimum password length to 10 characters on a Cisco device?",opts:["password min-length 10","security passwords min-length 10","line password minimum 10","ip security password-length 10"],ans:1,exp:"'security passwords min-length 10' (global config) enforces minimum password length of 10 characters. Any attempt to set a shorter password is rejected. This is a global setting affecting all password types. Combine with 'login block-for' for comprehensive authentication security."},
];

let uA={},sub={},cf='all';
function rl(){
  const s=document.getElementById('search').value.toLowerCase();
  const c=document.getElementById('qlist');
  let h='',prev='';
  qs.forEach((q,i)=>{
    if(cf==='correct'&&!(sub[i]&&uA[i]===q.ans))return;
    if(cf==='wrong'&&!(sub[i]&&uA[i]!==q.ans))return;
    if(cf==='unattempted'&&sub[i])return;
    if(s&&!q.q.toLowerCase().includes(s)&&!q.cat.toLowerCase().includes(s)&&!q.exp.toLowerCase().includes(s))return;
    if(q.cat!==prev){h+=`<div class="cat-header">📌 ${q.cat}</div>`;prev=q.cat;}
    const iS=sub[i],iC=iS&&uA[i]===q.ans,iW=iS&&uA[i]!==q.ans;
    let cc='q-card';if(iC)cc+=' answered-correct';if(iW)cc+=' answered-wrong';
    let badge='';
    if(iC)badge='<span class="result-badge rb-correct">✓ Correct</span>';
    else if(iW)badge='<span class="result-badge rb-wrong">✗ Wrong</span>';
    else if(uA[i]!==undefined)badge='<span class="result-badge" style="background:#e0f2fe;color:#0369a1">Selected</span>';
    h+=`<div class="${cc}" id="qc${i}">
      <div class="q-header">
        <span class="q-num">Q${i+1}${q.hot?'<span class="tag-hot">🔥</span>':''}</span>
        <span style="flex:1"></span>${badge}
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    ['A','B','C','D'].forEach((L,oi)=>{
      let cls='opt';
      if(uA[i]===oi&&!iS)cls+=' selected';
      if(iS&&oi===q.ans)cls+=' correct-ans';
      if(iS&&uA[i]===oi&&oi!==q.ans)cls+=' wrong-ans';
      const d=iS?'style="cursor:default"':`onclick="sel(${i},${oi})"`;
      h+=`<div class="${cls}" ${d}><span class="opt-letter">${L}</span>${q.opts[oi]}</div>`;
    });
    h+=`</div><div class="btn-row">
      ${!iS?`<button class="btn btn-submit" onclick="sbQ(${i})">Submit</button>`:''}
      <button class="btn btn-show" onclick="tgE(${i})">Explanation</button>
      ${iS?`<button class="btn btn-reset-q" onclick="rsQ(${i})">Reset</button>`:''}
    </div>
    <div class="explanation" id="ex${i}"><strong>✅ </strong>${q.exp}</div></div>`;
  });
  if(!h)h='<div style="padding:20px;text-align:center;color:#888">No matching questions.</div>';
  c.innerHTML=h;upS();
}
function sel(i,o){if(sub[i])return;uA[i]=o;rl();}
function sbQ(i){if(uA[i]===undefined){alert('Select an answer!');return;}sub[i]=true;rl();}
function tgE(i){const e=document.getElementById('ex'+i);if(e)e.classList.toggle('show');}
function rsQ(i){delete uA[i];delete sub[i];rl();}
function saAll(){qs.forEach((_,i)=>{if(uA[i]!==undefined)sub[i]=true;});rl();}
function raAll(){document.querySelectorAll('.explanation').forEach(e=>e.classList.add('show'));}
function resetAll(){if(!confirm('Reset all?'))return;uA={};sub={};rl();}
function showScore(){
  const tot=qs.length,att=Object.keys(sub).length;
  const cor=qs.filter((q,i)=>sub[i]&&uA[i]===q.ans).length;
  const pct=att>0?Math.round(cor/tot*100):0;
  const g=pct>=90?'🏆 Excellent — Exam Ready!':pct>=75?'👍 Good — Keep Practicing':pct>=60?'📚 Needs More Review':'🔄 Study More Before Exam';
  const ov=document.createElement('div');ov.className='overlay';ov.onclick=cm;
  const md=document.createElement('div');md.className='score-modal';
  md.innerHTML=`<h2>Security Fundamentals Score</h2><div class="big">${pct}%</div>
    <p style="margin:8px 0;font-size:14px">${cor}/${tot} correct</p>
    <p style="color:#dc2626">Wrong: ${att-cor}</p>
    <p style="color:#6b7280;margin-bottom:12px">Unattempted: ${tot-att}</p>
    <p style="font-size:16px;font-weight:700;color:#5B3FD4">${g}</p>
    <button class="gbtn gbtn-primary" style="margin-top:14px" onclick="cm()">Close</button>`;
  document.body.appendChild(ov);document.body.appendChild(md);window._m=md;window._o=ov;
}
function cm(){if(window._m)window._m.remove();if(window._o)window._o.remove();}
function upS(){
  const tot=qs.length,att=Object.keys(sub).length;
  const cor=qs.filter((q,i)=>sub[i]&&uA[i]===q.ans).length;
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-correct').textContent=cor;
  document.getElementById('s-wrong').textContent=att-cor;
  document.getElementById('s-unattempted').textContent=tot-att;
  const pct=att>0?Math.round(cor/tot*100):0;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=Math.round(att/tot*100)+'%';
}
function sf(f,btn){cf=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rl();}
function af(){rl();}

// ---------------------------------------------------------

// Fisher-Yates shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Shuffle options and fix answer index
function shuffleQuestions() {
  qs.forEach(q => {
    const correctAnswer = q.opts[q.ans];

    const paired = q.opts.map((opt, idx) => ({
      text: opt,
      wasCorrect: idx === q.ans
    }));

    shuffle(paired);

    q.opts = paired.map(x => x.text);
    q.ans = paired.findIndex(x => x.wasCorrect);
  });

  shuffle(qs);
}

// Run once when page loads
shuffleQuestions();

// ----------------------------------------------------------

rl();
</script>
